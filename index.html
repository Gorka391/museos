<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Exposición VR - Coches Clásicos de Rally</title>
  <meta name="description" content="Museo virtual 3D de coches clásicos de rally y sport de los años 80 y 90. Experiencia VR inmersiva.">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #000; overflow: hidden; }
  </style>
</head>
<body>
<a-scene renderer="antialias: true; colorManagement: true;" fog="type: linear; color: #1a1a1a; near: 30; far: 65">

<script>
// ========== COMPONENTE: LOW-POLY CAR BUILDER ==========
AFRAME.registerComponent('lowpoly-car', {
  schema: {
    bodyColor:   { type: 'color', default: '#ffffff' },
    accentColor: { type: 'color', default: '#333333' },
    wheelColor:  { type: 'color', default: '#111111' },
    rimColor:    { type: 'color', default: '#ccc' },
    // Body shape
    bodyLength:  { type: 'number', default: 3.6 },
    bodyWidth:   { type: 'number', default: 1.6 },
    bodyHeight:  { type: 'number', default: 0.6 },
    // Cabin
    cabinLength: { type: 'number', default: 1.8 },
    cabinHeight: { type: 'number', default: 0.55 },
    cabinOffset: { type: 'number', default: -0.1 },
    // Features
    hasSpoiler:    { type: 'boolean', default: false },
    spoilerHeight: { type: 'number', default: 0.6 },
    hasWhaleTail:  { type: 'boolean', default: false },
    isHatchback:   { type: 'boolean', default: false },
    isLowSport:    { type: 'boolean', default: false },
    wheelRadius:   { type: 'number', default: 0.28 },
    stripeColor:   { type: 'color', default: '' },
  },

  init: function () {
    const d = this.data;
    const el = this.el;
    const bL = d.bodyLength, bW = d.bodyWidth, bH = d.bodyHeight;
    const cL = d.cabinLength, cH = d.cabinHeight;
    const baseY = d.wheelRadius + 0.05;

    // ---- CHASSIS / UNDERBODY ----
    const chassis = document.createElement('a-box');
    chassis.setAttribute('width', bL);
    chassis.setAttribute('height', 0.1);
    chassis.setAttribute('depth', bW);
    chassis.setAttribute('position', `0 ${baseY - 0.05} 0`);
    chassis.setAttribute('color', '#111');
    chassis.setAttribute('material', 'roughness: 0.8');
    el.appendChild(chassis);

    // ---- MAIN BODY ----
    const body = document.createElement('a-box');
    body.setAttribute('width', bL);
    body.setAttribute('height', bH);
    body.setAttribute('depth', bW);
    body.setAttribute('position', `0 ${baseY + bH / 2} 0`);
    body.setAttribute('color', d.bodyColor);
    body.setAttribute('material', `roughness: 0.3; metalness: 0.5`);
    el.appendChild(body);

    // ---- CABIN ----
    const cabY = baseY + bH + cH / 2;
    const cabin = document.createElement('a-box');
    cabin.setAttribute('width', cL);
    cabin.setAttribute('height', cH);
    cabin.setAttribute('depth', bW * 0.92);
    cabin.setAttribute('position', `${d.cabinOffset} ${cabY} 0`);
    cabin.setAttribute('color', '#222');
    cabin.setAttribute('material', 'roughness: 0.1; metalness: 0.3; opacity: 0.7; transparent: true');
    el.appendChild(cabin);

    // ---- WINDSHIELDS (front & rear) ----
    const wsH = cH * 0.9;
    const wsFront = document.createElement('a-box');
    wsFront.setAttribute('width', 0.04);
    wsFront.setAttribute('height', wsH);
    wsFront.setAttribute('depth', bW * 0.85);
    wsFront.setAttribute('position', `${d.cabinOffset + cL / 2 + 0.15} ${cabY} 0`);
    wsFront.setAttribute('rotation', '0 0 15');
    wsFront.setAttribute('color', '#1a3a5c');
    wsFront.setAttribute('material', 'opacity: 0.5; transparent: true; metalness: 0.8');
    el.appendChild(wsFront);

    if (!d.isHatchback) {
      const wsRear = document.createElement('a-box');
      wsRear.setAttribute('width', 0.04);
      wsRear.setAttribute('height', wsH);
      wsRear.setAttribute('depth', bW * 0.85);
      wsRear.setAttribute('position', `${d.cabinOffset - cL / 2 - 0.15} ${cabY} 0`);
      wsRear.setAttribute('rotation', '0 0 -15');
      wsRear.setAttribute('color', '#1a3a5c');
      wsRear.setAttribute('material', 'opacity: 0.5; transparent: true; metalness: 0.8');
      el.appendChild(wsRear);
    }

    // ---- HEADLIGHTS ----
    for (let side of [-1, 1]) {
      const hl = document.createElement('a-box');
      hl.setAttribute('width', 0.06);
      hl.setAttribute('height', 0.15);
      hl.setAttribute('depth', 0.25);
      hl.setAttribute('position', `${bL / 2 + 0.02} ${baseY + bH * 0.5} ${side * bW * 0.3}`);
      hl.setAttribute('color', '#ffffcc');
      hl.setAttribute('material', 'emissive: #ffffaa; emissiveIntensity: 0.3');
      el.appendChild(hl);
    }

    // ---- TAILLIGHTS ----
    for (let side of [-1, 1]) {
      const tl = document.createElement('a-box');
      tl.setAttribute('width', 0.06);
      tl.setAttribute('height', 0.12);
      tl.setAttribute('depth', 0.3);
      tl.setAttribute('position', `${-bL / 2 - 0.02} ${baseY + bH * 0.45} ${side * bW * 0.3}`);
      tl.setAttribute('color', '#ff2222');
      tl.setAttribute('material', 'emissive: #ff0000; emissiveIntensity: 0.3');
      el.appendChild(tl);
    }

    // ---- FRONT BUMPER ----
    const bumperF = document.createElement('a-box');
    bumperF.setAttribute('width', 0.12);
    bumperF.setAttribute('height', 0.2);
    bumperF.setAttribute('depth', bW + 0.05);
    bumperF.setAttribute('position', `${bL / 2 + 0.05} ${baseY + 0.1} 0`);
    bumperF.setAttribute('color', d.accentColor);
    bumperF.setAttribute('material', 'roughness: 0.4');
    el.appendChild(bumperF);

    // ---- REAR BUMPER ----
    const bumperR = document.createElement('a-box');
    bumperR.setAttribute('width', 0.12);
    bumperR.setAttribute('height', 0.2);
    bumperR.setAttribute('depth', bW + 0.05);
    bumperR.setAttribute('position', `${-bL / 2 - 0.05} ${baseY + 0.1} 0`);
    bumperR.setAttribute('color', d.accentColor);
    bumperR.setAttribute('material', 'roughness: 0.4');
    el.appendChild(bumperR);

    // ---- GRILLE ----
    const grille = document.createElement('a-box');
    grille.setAttribute('width', 0.05);
    grille.setAttribute('height', 0.25);
    grille.setAttribute('depth', bW * 0.5);
    grille.setAttribute('position', `${bL / 2 + 0.01} ${baseY + bH * 0.3} 0`);
    grille.setAttribute('color', '#222');
    grille.setAttribute('material', 'roughness: 0.2; metalness: 0.8');
    el.appendChild(grille);

    // ---- STRIPE (if provided) ----
    if (d.stripeColor) {
      const stripe = document.createElement('a-box');
      stripe.setAttribute('width', bL + 0.02);
      stripe.setAttribute('height', 0.08);
      stripe.setAttribute('depth', bW + 0.01);
      stripe.setAttribute('position', `0 ${baseY + bH * 0.7} 0`);
      stripe.setAttribute('color', d.stripeColor);
      stripe.setAttribute('material', 'roughness: 0.3');
      el.appendChild(stripe);
    }

    // ---- SPOILER ----
    if (d.hasSpoiler) {
      const spoilerBase = document.createElement('a-box');
      spoilerBase.setAttribute('width', 0.06);
      spoilerBase.setAttribute('height', d.spoilerHeight);
      spoilerBase.setAttribute('depth', 0.06);
      const spY = baseY + bH + d.spoilerHeight / 2;
      spoilerBase.setAttribute('position', `${-bL / 2 + 0.3} ${spY} ${bW * 0.3}`);
      spoilerBase.setAttribute('color', d.bodyColor);
      el.appendChild(spoilerBase);

      const spoilerBase2 = spoilerBase.cloneNode(true);
      spoilerBase2.setAttribute('position', `${-bL / 2 + 0.3} ${spY} ${-bW * 0.3}`);
      el.appendChild(spoilerBase2);

      const spoilerWing = document.createElement('a-box');
      spoilerWing.setAttribute('width', 0.2);
      spoilerWing.setAttribute('height', 0.04);
      spoilerWing.setAttribute('depth', bW + 0.15);
      spoilerWing.setAttribute('position', `${-bL / 2 + 0.3} ${baseY + bH + d.spoilerHeight + 0.02} 0`);
      spoilerWing.setAttribute('color', d.bodyColor);
      spoilerWing.setAttribute('material', 'roughness: 0.2; metalness: 0.4');
      el.appendChild(spoilerWing);
    }

    // ---- WHALE TAIL ----
    if (d.hasWhaleTail) {
      const wt = document.createElement('a-box');
      wt.setAttribute('width', 0.5);
      wt.setAttribute('height', 0.06);
      wt.setAttribute('depth', bW + 0.1);
      wt.setAttribute('position', `${-bL / 2 + 0.2} ${baseY + bH + cH * 0.3} 0`);
      wt.setAttribute('rotation', '0 0 -10');
      wt.setAttribute('color', d.bodyColor);
      wt.setAttribute('material', 'roughness: 0.2; metalness: 0.4');
      el.appendChild(wt);
    }

    // ---- WHEELS ----
    const wR = d.wheelRadius;
    const wheelPositions = [
      { x: bL * 0.33,  z: bW / 2 + 0.02 },
      { x: bL * 0.33,  z: -bW / 2 - 0.02 },
      { x: -bL * 0.33, z: bW / 2 + 0.02 },
      { x: -bL * 0.33, z: -bW / 2 - 0.02 },
    ];
    wheelPositions.forEach(wp => {
      // Tire
      const tire = document.createElement('a-cylinder');
      tire.setAttribute('radius', wR);
      tire.setAttribute('height', 0.18);
      tire.setAttribute('rotation', '90 0 0');
      tire.setAttribute('position', `${wp.x} ${wR} ${wp.z}`);
      tire.setAttribute('color', d.wheelColor);
      tire.setAttribute('material', 'roughness: 0.9');
      el.appendChild(tire);
      // Rim
      const rim = document.createElement('a-cylinder');
      rim.setAttribute('radius', wR * 0.55);
      rim.setAttribute('height', 0.19);
      rim.setAttribute('rotation', '90 0 0');
      rim.setAttribute('position', `${wp.x} ${wR} ${wp.z}`);
      rim.setAttribute('color', d.rimColor);
      rim.setAttribute('material', 'roughness: 0.2; metalness: 0.8');
      el.appendChild(rim);
    });

    // low-sport adjustments
    if (d.isLowSport) {
      el.setAttribute('position', {
        x: el.getAttribute('position').x,
        y: (el.getAttribute('position').y || 0) - 0.08,
        z: el.getAttribute('position').z
      });
    }
  }
});

// ========== GENERATE SCENE ON LOAD ==========
document.addEventListener('DOMContentLoaded', () => {
  const scene = document.querySelector('a-scene');

  // Layout: 4 rows of 4 cars
  const startX = -13.5;
  const startZ = -8;
  const spacingX = 9;
  const spacingZ = 8;

  CARS.forEach((car, i) => {
    const row = Math.floor(i / 4);
    const col = i % 4;
    const posX = startX + col * spacingX;
    const posZ = startZ + row * spacingZ;

    // Platform
    const platform = document.createElement('a-entity');
    platform.setAttribute('position', `${posX} 0 ${posZ}`);

    // Platform base
    const base = document.createElement('a-box');
    base.setAttribute('width', 5.5);
    base.setAttribute('height', 0.12);
    base.setAttribute('depth', 3);
    base.setAttribute('position', '0 0.06 0');
    base.setAttribute('color', '#1a1a1a');
    base.setAttribute('material', 'roughness: 0.15; metalness: 0.7');
    platform.appendChild(base);

    // Platform accent border
    const border = document.createElement('a-box');
    border.setAttribute('width', 5.7);
    border.setAttribute('height', 0.06);
    border.setAttribute('depth', 3.2);
    border.setAttribute('position', '0 0.01 0');
    border.setAttribute('color', '#ff6a00');
    border.setAttribute('material', 'roughness: 0.3; metalness: 0.5');
    platform.appendChild(border);

    // The car entity
    const carEntity = document.createElement('a-entity');
    carEntity.setAttribute('position', '0 0.13 0');
    carEntity.setAttribute('rotation', '0 90 0');
    carEntity.setAttribute('lowpoly-car', {
      bodyColor: car.color,
      accentColor: car.accent,
      rimColor: car.rim,
      stripeColor: car.stripe || '',
      hasSpoiler: car.spoiler,
      spoilerHeight: car.sH || 0.4,
      hasWhaleTail: car.whaleTail,
      isHatchback: car.hatch,
      isLowSport: car.lowSport || false,
      bodyLength: car.bL,
      bodyWidth: car.bW,
      bodyHeight: car.bH,
      cabinLength: car.cL,
      cabinHeight: car.cH,
      cabinOffset: car.cO
    });
    platform.appendChild(carEntity);

    // Spot light per car
    const spot = document.createElement('a-light');
    spot.setAttribute('type', 'spot');
    spot.setAttribute('color', '#ffffff');
    spot.setAttribute('intensity', '1.5');
    spot.setAttribute('position', '0 6 0');
    spot.setAttribute('rotation', '-90 0 0');
    spot.setAttribute('angle', '35');
    spot.setAttribute('penumbra', '0.6');
    platform.appendChild(spot);

    // Small point light beneath for glow
    const glow = document.createElement('a-light');
    glow.setAttribute('type', 'point');
    glow.setAttribute('color', '#ff6a00');
    glow.setAttribute('intensity', '0.15');
    glow.setAttribute('distance', '4');
    glow.setAttribute('position', '0 0.3 0');
    platform.appendChild(glow);

    // ---- DESCRIPTIVE PLAQUE ----
    const plaque = document.createElement('a-entity');
    plaque.setAttribute('position', '0 1.1 -1.9');

    const plaqueBack = document.createElement('a-plane');
    plaqueBack.setAttribute('width', '3.2');
    plaqueBack.setAttribute('height', '1.1');
    plaqueBack.setAttribute('color', '#111111');
    plaqueBack.setAttribute('material', 'roughness: 0.5');
    plaque.appendChild(plaqueBack);

    const plaqueBorder = document.createElement('a-plane');
    plaqueBorder.setAttribute('width', '3.3');
    plaqueBorder.setAttribute('height', '1.2');
    plaqueBorder.setAttribute('color', '#ff6a00');
    plaqueBorder.setAttribute('material', 'roughness: 0.3');
    plaqueBorder.setAttribute('position', '0 0 -0.005');
    plaque.appendChild(plaqueBorder);

    // Title
    const title = document.createElement('a-text');
    title.setAttribute('value', `${car.name} (${car.year})`);
    title.setAttribute('align', 'center');
    title.setAttribute('position', '0 0.3 0.02');
    title.setAttribute('width', '3');
    title.setAttribute('color', '#ff6a00');
    title.setAttribute('font', 'mozillavr');
    plaque.appendChild(title);

    // Description
    const desc = document.createElement('a-text');
    desc.setAttribute('value', car.desc);
    desc.setAttribute('align', 'center');
    desc.setAttribute('position', '0 -0.1 0.02');
    desc.setAttribute('width', '2.5');
    desc.setAttribute('color', '#e0e0e0');
    plaque.appendChild(desc);

    platform.appendChild(plaque);
    scene.appendChild(platform);
  });
});
</script>

<a-box position="0 4 -14" width="42" height="8" depth="0.5" color="#e8e8e8" material="roughness: 0.7"></a-box>
<!-- Pared trasera (blanca suave) -->
