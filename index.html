<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Museo VR de Maquetas de Coches Antiguos</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #050505; }
  </style>
</head>
<body>
  <a-scene ui="enabled: true" renderer="antialias: true; colorManagement: true;">
    
    <!-- GESTIÓN DE RECURSOS: MAQUETAS 3D -->
    <a-assets>
      <!-- Modelos 3D precisos de vehículos clásicos -->
      
      <!-- Coche Izquierdo (Porsche 911 Clásico) -->
      <a-asset-item id="porsche-model" src="https://raw.githubusercontent.com/05akalan57/react-three-fiber-nfsu2/b4facb77da94b62c51ea2e686c14101ec670f983/public/porsche.glb" crossorigin="anonymous"></a-asset-item>

      <!-- Fageol Truck Clásico -->
      <a-asset-item id="fageol-truck" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb" crossorigin="anonymous"></a-asset-item>

      <!-- Meyers Manx Buggy Antiguo -->
      <a-asset-item id="meyers-buggy" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Buggy/glTF-Binary/Buggy.glb" crossorigin="anonymous"></a-asset-item>

      <!-- Plymouth Deluxe (Babylon Car) -->
      <a-asset-item id="plymouth-sedan" src="https://raw.githubusercontent.com/BabylonJS/Assets/master/meshes/car.glb" crossorigin="anonymous"></a-asset-item>
    </a-assets>

    <!-- CÁMARA Y CONTROLES VR -->
    <a-entity position="0 1.6 4">
      <a-camera look-controls wasd-controls="acceleration: 80">
        <a-cursor color="#ef4444"></a-cursor>
      </a-camera>
    </a-entity>
    <a-entity laser-controls="hand: left"></a-entity>
    <a-entity laser-controls="hand: right"></a-entity>

    <!-- ILUMINACIÓN SHOWROOM PREMIUM -->
    <a-light type="ambient" color="#262626" intensity="1.5"></a-light>
    <a-light type="point" intensity="0.6" position="0 8 0" distance="40" color="#fca5a5"></a-light>
    <a-light type="directional" intensity="0.5" position="-5 6 5" color="#ffffff" castShadow="true"></a-light>
    <a-light type="directional" intensity="0.3" position="5 6 -5" color="#ffffff"></a-light>

    <!-- ARQUITECTURA: SUELO, TECHO Y PAREDES -->
    <a-plane rotation="-90 0 0" width="60" height="60" color="#111" material="roughness: 0.1; metalness: 0.8"></a-plane>
    <a-plane rotation="90 0 0" position="0 10 0" width="60" height="60" color="#050505" material="roughness: 1"></a-plane>
    
    <a-box position="0 5 -15" width="30" height="10" depth="0.5" color="#1c1917" material="roughness: 0.8"></a-box>
    <a-box position="0 5 15" width="30" height="10" depth="0.5" color="#1c1917" material="roughness: 0.8"></a-box>
    <a-box position="-15 5 0" width="0.5" height="10" depth="30" color="#292524" material="roughness: 0.8"></a-box>
    <a-box position="15 5 0" width="0.5" height="10" depth="30" color="#292524" material="roughness: 0.8"></a-box>

    <!-- MAQUETAS REALES DE COCHES CLÁSICOS (4 Vehículos Auténticos) -->

    <!-- MAQUETA 1: CENTRO-IZQUIERDA (Buggy Clásico) -->
    <a-entity position="-5.5 0 -4" rotation="0 30 0">
      <a-cylinder position="0 0.1 0" radius="3" height="0.2" color="#404040" material="metalness: 0.6; roughness: 0.3"></a-cylinder>
      <a-cylinder position="0 0.25 0" radius="2.8" height="0.1" color="#ef4444" material="metalness: 0.4"></a-cylinder>
      
      <a-entity position="0 0.3 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
        <a-gltf-model src="#meyers-buggy" scale="0.025 0.025 0.025"></a-gltf-model>
      </a-entity>

      <a-light type="spot" color="#60a5fa" intensity="2" position="0 5 0" rotation="-90 0 0" angle="45" penumbra="0.5"></a-light>

      <a-entity position="0 0.8 3.5" rotation="-15 0 0">
        <a-plane width="2.8" height="1.2" color="#111"></a-plane>
        <a-text value="Meyers Manx Buggy (1964)\n\nEl autentico buggy original.\nBasado en el chasis acortado de un\nVolkswagen Escarabajo. Icono de California." 
                align="center" position="0 0 0.02" width="2.6" color="#bfdbfe"></a-text>
      </a-entity>
    </a-entity>

    <!-- MAQUETA 2: CENTRO-DERECHA (Porsche 911) -->
    <a-entity position="5.5 0 -4" rotation="0 -30 0">
      <a-cylinder position="0 0.1 0" radius="3" height="0.2" color="#404040" material="metalness: 0.6; roughness: 0.3"></a-cylinder>
      <a-cylinder position="0 0.25 0" radius="2.8" height="0.1" color="#ef4444" material="metalness: 0.4"></a-cylinder>
      
      <a-entity position="0 0.3 0" animation="property: rotation; to: 0 -360 0; loop: true; dur: 22000; easing: linear">
        <a-gltf-model src="#porsche-model" scale="1.1 1.1 1.1"></a-gltf-model>
      </a-entity>

      <a-light type="spot" color="#a78bfa" intensity="2" position="0 5 0" rotation="-90 0 0" angle="45" penumbra="0.5"></a-light>

      <a-entity position="0 0.8 3.5" rotation="-15 0 0">
        <a-plane width="2.8" height="1.2" color="#111"></a-plane>
        <a-text value="Porsche 911 Carrera (1973)\n\nEl deportivo de motor trasero por excelencia.\nCon su reconocible silueta y los miticos\nfaros redondos de la primera generacion." 
                align="center" position="0 0 0.02" width="2.6" color="#ede9fe"></a-text>
      </a-entity>
    </a-entity>

    <!-- MAQUETA 3: TRASERA-IZQUIERDA (Fageol Milk Truck) -->
    <a-entity position="-8 0 -10.5" rotation="0 50 0">
      <a-box position="0 0.1 0" width="5" height="0.2" depth="6.5" color="#111" material="metalness: 0.8"></a-box>
      
      <a-gltf-model src="#fageol-truck" position="0 0.2 0" scale="0.7 0.7 0.7"></a-gltf-model>

      <a-light type="spot" color="#fbbf24" intensity="2" position="0 5 0" rotation="-90 0 0" angle="40" penumbra="0.5"></a-light>

      <a-entity position="3.5 1 2" rotation="-10 -50 0">
        <a-plane width="3" height="1.2" color="#111"></a-plane>
        <a-text value="Fageol Delivery Truck (1920)\n\nVehiculo de reparto puramente historico.\nEste modelo se utilizaba a principios\ndel S.XX para transporte urbano ligero." 
                align="center" position="0 0 0.02" width="2.8" color="#fef3c7"></a-text>
      </a-entity>
    </a-entity>

    <!-- MAQUETA 4: TRASERA-DERECHA (Plymouth Sedan) -->
    <a-entity position="8 0 -10.5" rotation="0 -50 0">
      <a-box position="0 0.1 0" width="5" height="0.2" depth="6.5" color="#111" material="metalness: 0.8"></a-box>
      
      <a-gltf-model src="#plymouth-sedan" position="0 0.2 0" scale="1.3 1.3 1.3" rotation="0 180 0"></a-gltf-model>
      
      <a-light type="spot" color="#34d399" intensity="2" position="0 5 0" rotation="-90 0 0" angle="40" penumbra="0.5"></a-light>
      
      <a-entity position="-3.5 1 2" rotation="-10 50 0">
        <a-plane width="3" height="1.2" color="#111"></a-plane>
        <a-text value="Plymouth Deluxe Sedan (1940)\n\nElegante berlina clasica.\nRefleja el inconfundible estilo automotor\nde los a~os 40: formas abultadas y durabilidad." 
                align="center" position="0 0 0.02" width="2.8" color="#d1fae5"></a-text>
      </a-entity>
    </a-entity>

  </a-scene>
</body>
</html>
