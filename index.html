<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museo VR — Coches Clásicos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Josefin+Sans:wght@100;300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Josefin Sans', sans-serif; }

  #canvas { display: block; }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }

  #title-bar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 24px 40px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
  }
  #museum-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px; letter-spacing: 3px; color: #c8a96e;
    text-transform: uppercase;
  }
  #museum-sub {
    font-size: 10px; letter-spacing: 6px; color: rgba(200,169,110,0.6);
    text-transform: uppercase; margin-top: 2px;
  }

  #controls-hint {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 28px; align-items: center;
    background: rgba(0,0,0,0.5); border: 1px solid rgba(200,169,110,0.2);
    padding: 12px 28px; backdrop-filter: blur(8px);
    color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 2px;
  }
  .hint-key {
    background: rgba(200,169,110,0.15); border: 1px solid rgba(200,169,110,0.3);
    padding: 3px 8px; color: #c8a96e; font-size: 10px; letter-spacing: 1px;
  }

  /* Car info panel */
  #info-panel {
    position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    width: 340px; pointer-events: all;
    background: rgba(5,5,10,0.88);
    border-left: 1px solid rgba(200,169,110,0.3);
    border-top: 1px solid rgba(200,169,110,0.15);
    border-bottom: 1px solid rgba(200,169,110,0.15);
    backdrop-filter: blur(20px);
    padding: 40px 36px;
    opacity: 0; transition: opacity 0.5s, transform 0.5s;
    transform: translateY(-50%) translateX(20px);
  }
  #info-panel.visible {
    opacity: 1; transform: translateY(-50%) translateX(0);
  }
  #info-year {
    font-size: 11px; letter-spacing: 5px; color: #c8a96e;
    text-transform: uppercase; margin-bottom: 10px;
  }
  #info-name {
    font-family: 'Playfair Display', serif; font-size: 32px;
    color: #fff; line-height: 1.1; margin-bottom: 6px;
  }
  #info-brand {
    font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; margin-bottom: 28px;
  }
  .info-divider {
    width: 40px; height: 1px; background: #c8a96e; margin-bottom: 24px;
  }
  #info-desc {
    font-size: 13px; line-height: 1.8; color: rgba(255,255,255,0.65);
    margin-bottom: 28px;
  }
  .info-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
  .spec-item { border-top: 1px solid rgba(200,169,110,0.15); padding-top: 12px; }
  .spec-label { font-size: 9px; letter-spacing: 3px; color: rgba(200,169,110,0.6); text-transform: uppercase; margin-bottom: 4px; }
  .spec-value { font-size: 16px; color: #fff; font-weight: 300; letter-spacing: 1px; }

  #car-nav {
    display: flex; gap: 8px; justify-content: center;
  }
  .nav-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(200,169,110,0.2); border: 1px solid rgba(200,169,110,0.4);
    cursor: pointer; transition: all 0.3s;
  }
  .nav-dot.active { background: #c8a96e; }

  /* Crosshair */
  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(200,169,110,0.5);
  }
  #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  #crosshair::after { width: 100%; height: 1px; top: 50%; left: 0; }

  /* Minimap */
  #minimap {
    position: absolute; bottom: 80px; left: 32px;
    width: 120px; height: 80px;
    background: rgba(0,0,0,0.6); border: 1px solid rgba(200,169,110,0.2);
    backdrop-filter: blur(8px); overflow: hidden;
  }
  #minimap canvas { width: 100%; height: 100%; }

  /* Loading */
  #loader {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 1s;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-title {
    font-family: 'Playfair Display', serif; font-size: 42px; color: #c8a96e;
    letter-spacing: 6px; margin-bottom: 8px;
  }
  .loader-sub {
    font-size: 10px; letter-spacing: 8px; color: rgba(200,169,110,0.5);
    text-transform: uppercase; margin-bottom: 48px;
  }
  .loader-bar-wrap {
    width: 200px; height: 1px; background: rgba(200,169,110,0.2);
  }
  .loader-bar {
    height: 1px; background: #c8a96e; width: 0;
    transition: width 2s ease;
  }
  .loader-hint {
    margin-top: 32px; font-size: 10px; letter-spacing: 3px;
    color: rgba(255,255,255,0.3); text-transform: uppercase;
  }

  /* Enter btn */
  #enter-btn {
    margin-top: 32px; padding: 14px 48px;
    background: transparent; border: 1px solid #c8a96e;
    color: #c8a96e; font-family: 'Josefin Sans', sans-serif;
    font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
    cursor: pointer; transition: all 0.3s; display: none;
  }
  #enter-btn:hover { background: #c8a96e; color: #000; }

  #selected-car {
    position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
    font-size: 10px; letter-spacing: 4px; color: rgba(200,169,110,0.7);
    text-transform: uppercase; text-align: center;
    background: rgba(0,0,0,0.5); padding: 8px 20px;
    border: 1px solid rgba(200,169,110,0.2);
    backdrop-filter: blur(8px);
    opacity: 0; transition: opacity 0.3s;
  }
  #selected-car.show { opacity: 1; }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader">
  <div class="loader-title">MUSEO</div>
  <div class="loader-sub">Coches Clásicos · Colección Permanente</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-hint" id="loader-hint">Construyendo museo...</div>
  <button id="enter-btn" onclick="enterMuseum()">Entrar al Museo</button>
</div>

<!-- Canvas -->
<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="title-bar">
    <div>
      <div id="museum-name">Museo Automovilístico</div>
      <div id="museum-sub">Colección de Vehículos Históricos</div>
    </div>
    <div style="font-size:10px;letter-spacing:3px;color:rgba(200,169,110,0.5);">EST. MMXXV</div>
  </div>

  <div id="crosshair"></div>

  <div id="info-panel">
    <div id="info-year"></div>
    <div id="info-name"></div>
    <div id="info-brand"></div>
    <div class="info-divider"></div>
    <div id="info-desc"></div>
    <div class="info-specs" id="info-specs"></div>
    <div id="car-nav"></div>
  </div>

  <div id="selected-car">Haz clic para ver información</div>

  <div id="controls-hint">
    <span><span class="hint-key">W A S D</span> Mover</span>
    <span><span class="hint-key">RATÓN</span> Mirar</span>
    <span><span class="hint-key">CLIC</span> Seleccionar</span>
    <span><span class="hint-key">ESC</span> Soltar cursor</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===================== DATA =====================
const CARS = [
  {
    id: 0, name: "Model T", brand: "Ford", year: "1908",
    color: 0x1a1a1a, accentColor: 0x8B7355,
    desc: "El primer automóvil producido en masa de la historia. Henry Ford revolucionó la industria con la cadena de montaje, haciendo el automóvil accesible al público general por primera vez.",
    specs: [
      { label: "Motor", value: "4 cil." },
      { label: "Potencia", value: "20 CV" },
      { label: "Vel. máx.", value: "72 km/h" },
      { label: "Producción", value: "15M uds." },
    ],
    position: [-14, 0, 0],
    type: 'modelT'
  },
  {
    id: 1, name: "Type 35", brand: "Bugatti", year: "1924",
    color: 0x1a3a6e, accentColor: 0xc8a96e,
    desc: "Considerado uno de los coches de carreras más exitosos de todos los tiempos. Elegancia y rendimiento unidos en perfecta armonía por Ettore Bugatti durante los años dorados del automovilismo.",
    specs: [
      { label: "Motor", value: "8 cil." },
      { label: "Potencia", value: "128 CV" },
      { label: "Vel. máx.", value: "210 km/h" },
      { label: "Victorias", value: "+1000" },
    ],
    position: [-7, 0, 0],
    type: 'racer'
  },
  {
    id: 2, name: "Silver Ghost", brand: "Rolls-Royce", year: "1907",
    color: 0xc0c0c0, accentColor: 0xc8a96e,
    desc: "Apodado 'el mejor automóvil del mundo'. Su silencio mecánico legendario y su acabado artesanal establecieron los estándares del lujo automovilístico que perduran hasta hoy.",
    specs: [
      { label: "Motor", value: "6 cil." },
      { label: "Potencia", value: "48 CV" },
      { label: "Vel. máx.", value: "105 km/h" },
      { label: "Precio 1907", value: "£985" },
    ],
    position: [0, 0, 0],
    type: 'luxury'
  },
  {
    id: 3, name: "E-Type", brand: "Jaguar", year: "1961",
    color: 0x8B0000, accentColor: 0xc0c0c0,
    desc: "Enzo Ferrari lo llamó 'el coche más hermoso jamás construido'. Líneas de pura seducción, motor potente y precio accesible lo convirtieron en el símbolo del swinging sixties británico.",
    specs: [
      { label: "Motor", value: "6 cil." },
      { label: "Potencia", value: "265 CV" },
      { label: "Vel. máx.", value: "241 km/h" },
      { label: "0–100", value: "6.9 s" },
    ],
    position: [7, 0, 0],
    type: 'etype'
  },
  {
    id: 4, name: "250 GTO", brand: "Ferrari", year: "1962",
    color: 0xcc2200, accentColor: 0xf5c518,
    desc: "La obra maestra absoluta de Maranello. Creado para competir en GT y ganar. Hoy es el coche más valioso del mundo, con ejemplares vendidos por más de 70 millones de dólares.",
    specs: [
      { label: "Motor", value: "V12" },
      { label: "Potencia", value: "302 CV" },
      { label: "Vel. máx.", value: "280 km/h" },
      { label: "Unidades", value: "36" },
    ],
    position: [14, 0, 0],
    type: 'gto'
  }
];

// ===================== THREE SETUP =====================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
scene.fog = new THREE.FogExp2(0x050508, 0.035);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(0, 1.7, 12);

// ===================== LIGHTING =====================
const ambient = new THREE.AmbientLight(0x111122, 0.5);
scene.add(ambient);

// Ceiling spotlights per car
CARS.forEach(car => {
  const spot = new THREE.SpotLight(0xffeedd, 2.5, 20, 0.35, 0.4);
  spot.position.set(car.position[0], 9, car.position[2]);
  spot.target.position.set(car.position[0], 0, car.position[2]);
  spot.castShadow = true;
  scene.add(spot);
  scene.add(spot.target);

  const fill = new THREE.PointLight(0x334466, 0.4, 8);
  fill.position.set(car.position[0], 1.5, car.position[2] + 3);
  scene.add(fill);
});

// Ambient strips
[-18, 18].forEach(x => {
  const strip = new THREE.RectAreaLight ? null : new THREE.PointLight(0x1a2a4a, 0.3, 30);
  if (strip) { strip.position.set(x, 4, 0); scene.add(strip); }
});

// ===================== MUSEUM ARCHITECTURE =====================
function buildMuseum() {
  const mat = (color, rough = 0.8, metal = 0.0) => new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: metal });

  // Floor — dark marble
  const floorGeo = new THREE.PlaneGeometry(60, 30);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0e, roughness: 0.1, metalness: 0.6 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Floor grid lines
  for (let i = -15; i <= 15; i += 3) {
    const lg = new THREE.PlaneGeometry(60, 0.02);
    const lm = new THREE.MeshBasicMaterial({ color: 0x1a1a2e });
    const l = new THREE.Mesh(lg, lm);
    l.rotation.x = -Math.PI / 2;
    l.position.set(0, 0.001, i);
    scene.add(l);
  }

  // Ceiling
  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(60, 30), mat(0x080810, 0.9));
  ceil.rotation.x = Math.PI / 2;
  ceil.position.y = 10;
  scene.add(ceil);

  // Walls
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x0c0c16, roughness: 0.9 });

  const backWall = new THREE.Mesh(new THREE.PlaneGeometry(60, 10), wallMat);
  backWall.position.set(0, 5, -15);
  scene.add(backWall);

  const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(60, 10), wallMat);
  frontWall.rotation.y = Math.PI;
  frontWall.position.set(0, 5, 15);
  scene.add(frontWall);

  const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 10), wallMat);
  leftWall.rotation.y = Math.PI / 2;
  leftWall.position.set(-30, 5, 0);
  scene.add(leftWall);

  const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(30, 10), wallMat);
  rightWall.rotation.y = -Math.PI / 2;
  rightWall.position.set(30, 5, 0);
  scene.add(rightWall);

  // Gold cornice strips
  [-29.9, 29.9].forEach(x => {
    const corn = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.3, 30), mat(0xc8a96e, 0.2, 0.9));
    corn.position.set(x, 8.5, 0);
    scene.add(corn);
  });

  // Pedestals per car
  CARS.forEach(car => {
    const pedGeo = new THREE.BoxGeometry(3.2, 0.15, 1.8);
    const pedMat = new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.3, metalness: 0.7 });
    const ped = new THREE.Mesh(pedGeo, pedMat);
    ped.position.set(car.position[0], 0.075, car.position[2]);
    ped.receiveShadow = true;
    scene.add(ped);

    // Gold trim on pedestal
    const trim = new THREE.Mesh(new THREE.BoxGeometry(3.25, 0.02, 1.85), mat(0xc8a96e, 0.1, 1.0));
    trim.position.set(car.position[0], 0.16, car.position[2]);
    scene.add(trim);

    // Name plate
    const plate = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.06, 0.4), mat(0xc8a96e, 0.2, 0.8));
    plate.position.set(car.position[0], 0.17, car.position[2] + 1.0);
    scene.add(plate);
  });

  // Ceiling light fixtures
  CARS.forEach(car => {
    const fix = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 0.2, 8), mat(0xc8a96e, 0.2, 0.9));
    fix.position.set(car.position[0], 9.9, car.position[2]);
    scene.add(fix);
  });

  // Columns
  [-21, -3, 3, 21].forEach(x => {
    const col = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 10, 12), mat(0x0e0e18, 0.7, 0.2));
    col.position.set(x, 5, 0);
    scene.add(col);
    const cap = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.15, 0.9), mat(0xc8a96e, 0.2, 0.8));
    cap.position.set(x, 10.05, 0);
    scene.add(cap);
    const base = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.8), mat(0xc8a96e, 0.2, 0.8));
    base.position.set(x, 0.05, 0);
    scene.add(base);
  });
}

// ===================== CAR BUILDERS =====================
function buildCar(carData) {
  const group = new THREE.Group();
  const c = carData.color;
  const acc = carData.accentColor;

  const bodyMat = new THREE.MeshStandardMaterial({ color: c, roughness: 0.25, metalness: 0.8 });
  const chromeMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.05, metalness: 1.0 });
  const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.0 });
  const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.0, metalness: 0.0, transparent: true, opacity: 0.3 });
  const accentMat = new THREE.MeshStandardMaterial({ color: acc, roughness: 0.2, metalness: 0.9 });
  const tireMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
  const rimMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.1, metalness: 1.0 });
  const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, roughness: 0.0, emissive: 0xffffcc, emissiveIntensity: 0.5 });

  const type = carData.type;

  if (type === 'modelT') {
    // FORD MODEL T
    // Main body — high, boxy
    const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.5, 1.1), bodyMat);
    body.position.set(0, 0.5, 0);
    group.add(body);
    // Cabin
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.7, 1.0), bodyMat);
    cabin.position.set(-0.1, 1.05, 0);
    group.add(cabin);
    // Roof
    const roof = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.08, 1.0), blackMat);
    roof.position.set(-0.1, 1.44, 0);
    group.add(roof);
    // Windshield
    const wind = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.5, 0.9), glassMat);
    wind.position.set(0.63, 1.0, 0);
    group.add(wind);
    // Hood
    const hood = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.55, 1.0), bodyMat);
    hood.position.set(0.95, 0.65, 0);
    group.add(hood);
    // Radiator grille
    const rad = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.5, 0.8), chromeMat);
    rad.position.set(1.35, 0.6, 0);
    group.add(rad);
    // Fenders front
    [-0.45, 0.45].forEach(z => {
      const fen = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.38, 0.15, 16), bodyMat);
      fen.rotation.x = Math.PI / 2;
      fen.rotation.z = Math.PI / 2;
      fen.position.set(1.0, 0.38, z);
      group.add(fen);
    });
    // Fenders rear
    [-0.45, 0.45].forEach(z => {
      const fen = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.38, 0.15, 16), bodyMat);
      fen.rotation.x = Math.PI / 2;
      fen.rotation.z = Math.PI / 2;
      fen.position.set(-0.9, 0.38, z);
      group.add(fen);
    });
    // Running boards
    [-0.58, 0.58].forEach(z => {
      const rb = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.05, 0.18), blackMat);
      rb.position.set(0, 0.28, z);
      group.add(rb);
    });
    // Headlamps
    [0.3, -0.3].forEach(z => {
      const lamp = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.2, 12), chromeMat);
      lamp.rotation.z = Math.PI / 2;
      lamp.position.set(1.38, 0.78, z);
      group.add(lamp);
      const lensG = new THREE.Mesh(new THREE.CircleGeometry(0.08, 12), lightMat);
      lensG.rotation.y = -Math.PI / 2;
      lensG.position.set(1.49, 0.78, z);
      group.add(lensG);
    });
    // Wheels
    [[1.0, 0.38, 0.58], [1.0, 0.38, -0.58], [-0.9, 0.38, 0.58], [-0.9, 0.38, -0.58]].forEach(([x,y,z]) => {
      const tire = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.09, 8, 24), tireMat);
      tire.rotation.y = Math.PI / 2;
      tire.position.set(x, y, z);
      group.add(tire);
      const spoke = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.6, 6), chromeMat);
      spoke.rotation.z = Math.PI / 2;
      spoke.position.set(x, y, z);
      group.add(spoke);
      const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.65, 8), chromeMat);
      hub.rotation.z = Math.PI / 2;
      hub.position.set(x, y, z);
      group.add(hub);
    });
    // Steering wheel
    const sw = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.02, 8, 20), chromeMat);
    sw.rotation.x = 0.4;
    sw.position.set(0.35, 0.9, 0);
    group.add(sw);

  } else if (type === 'racer') {
    // BUGATTI TYPE 35 — long low racer
    const body = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.35, 0.9), bodyMat);
    body.position.set(0, 0.5, 0);
    group.add(body);
    // Curved tail (taper back)
    const tailGeo = new THREE.CylinderGeometry(0.15, 0.45, 1.0, 8);
    const tail = new THREE.Mesh(tailGeo, bodyMat);
    tail.rotation.z = -Math.PI / 2;
    tail.position.set(-1.25, 0.55, 0);
    group.add(tail);
    // Long hood
    const hood = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.25, 0.75), bodyMat);
    hood.position.set(0.75, 0.68, 0);
    group.add(hood);
    // Cockpit
    const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.4, 0.7), bodyMat);

  } else if (type === 'luxury') {

    const spirit = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.2, 6), chromeMat);

    // Radiator — upright, prominent
    const rad = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.7, 0.9), chromeMat);
    rad.position.set(1.5, 0.65, 0);

    // Running boards
    [-0.7, 0.7].forEach(z => {

    [[1.1, 0.38, 0.72], [1.1, 0.38, -0.72], [-0.85, 0.38, 0.72], [-0.85, 0.38, -0.72]].forEach(([x,y,z]) => {

    // Bonnet scoop

    scoop.position.set(0.8, 0.78, 0);
    group.add(scoop);
    // Nose — Kamm style
    const nose = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.5, 0.6, 12), bodyMat);
    nose.rotation.z = -Math.PI / 2;
    nose.position.set(1.55, 0.55, 0);
    group.add(nose);
    // Triple vents on hood
    for (let i = 0; i < 3; i++) {

    [-0.25, 0, 0.25].forEach(z => {

      ex.position.set(-1.38, 0.35, z * 0.6);
      group.add(ex);
    });
    // Wide wheels
    [[1.05, 0.36, 0.72], [1.05, 0.36, -0.72], [-1.0, 0.36, 0.72], [-1.0, 0.36, -0.72]].forEach(([x,y,z]) => {
      const tire = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.13, 8, 24), tireMat);
      tire.rotation.y = Math.PI / 2;
      tire.position.set(x, y, z);
      group.add(tire);
      const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.72, 5), rimMat);
      rim.rotation.z = Math.PI / 2;
      rim.position.set(x, y, z);
      group.add(rim);
      const hubcap = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.74, 8), new THREE.MeshStandardMaterial({ color: 0xff2200, roughness: 0.3, metalness: 0.5 }));
      hubcap.rotation.z = Math.PI / 2;
      hubcap.position.set(x, y, z);
      group.add(hubcap);
      for (let s = 0; s < 5; s++) {

        spoke.rotation.z = s * Math.PI / 5;
        spoke.position.set(x, y, z);
        group.add(spoke);
      }
    });
  }

  group.position.set(...carData.position);
  group.position.y += 0.15;

  // Shadow
  group.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  return group;
}

// ===================== SCENE SETUP =====================
buildMuseum();

const carMeshes = [];
CARS.forEach(car => {
  const group = buildCar(car);
  scene.add(group);
  carMeshes.push({ group, data: car });
});

// Floating dust particles
const particleCount = 300;
const particleGeo = new THREE.BufferGeometry();
const particlePos = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePos[i * 3] = (Math.random() - 0.5) * 50;
  particlePos[i * 3 + 1] = Math.random() * 10;
  particlePos[i * 3 + 2] = (Math.random() - 0.5) * 25;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xc8a96e, size: 0.03, transparent: true, opacity: 0.4 });
scene.add(new THREE.Points(particleGeo, particleMat));

// ===================== CONTROLS =====================
const keys = {};
let isLocked = false;
let selectedCar = null;
let pitch = 0, yaw = 0;
const euler = new THREE.Euler(0, 0, 0, 'YXZ');

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('click', () => {
  if (!isLocked) canvas.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === canvas;
});

document.addEventListener('mousemove', e => {
  if (!isLocked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
});

// Click to select car
document.addEventListener('click', () => {
  if (!isLocked) return;
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const allMeshes = [];
  carMeshes.forEach(cm => cm.group.traverse(m => { if (m.isMesh) allMeshes.push(m); }));
  const hits = raycaster.intersectObjects(allMeshes);
  if (hits.length > 0) {
    const hitObj = hits[0].object;
    for (const cm of carMeshes) {
      let found = false;
      cm.group.traverse(m => { if (m === hitObj) found = true; });
      if (found) { showCarInfo(cm.data); break; }
    }
  }
});

function showCarInfo(car) {
  selectedCar = car;
  document.getElementById('info-year').textContent = car.year;
  document.getElementById('info-name').textContent = car.name;
  document.getElementById('info-brand').textContent = car.brand;
  document.getElementById('info-desc').textContent = car.desc;
  const specsEl = document.getElementById('info-specs');
  specsEl.innerHTML = '';
  car.specs.forEach(s => {
    specsEl.innerHTML += `<div class="spec-item"><div class="spec-label">${s.label}</div><div class="spec-value">${s.value}</div></div>`;
  });
  // Nav dots
  const nav = document.getElementById('car-nav');
  nav.innerHTML = '';
  CARS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (c.id === car.id ? ' active' : '');
    dot.onclick = () => showCarInfo(c);
    nav.appendChild(dot);
  });
  document.getElementById('info-panel').classList.add('visible');
}

// Hide panel on escape
document.addEventListener('keydown', e => {
  if (e.code === 'Escape') {
    document.getElementById('info-panel').classList.remove('visible');
  }
});

// ===================== ANIMATION =====================
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();
  frameCount++;

  // Rotate cars slowly
  carMeshes.forEach((cm, i) => {
    cm.group.rotation.y = Math.sin(t * 0.15 + i * 1.2) * 0.3;
  });

  // Particle drift
  const pos = particleGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i * 3 + 1] += Math.sin(t + i) * 0.0003;
  }
  particleGeo.attributes.position.needsUpdate = true;

  // Movement
  if (isLocked) {
    euler.set(pitch, yaw, 0);
    camera.quaternion.setFromEuler(euler);

    const speed = keys['ShiftLeft'] ? 8 : 4;
    const dir = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp']) dir.z -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) dir.z += 1;
    if (keys['KeyA'] || keys['ArrowLeft']) dir.x -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;
    if (dir.length() > 0) {
      dir.normalize();
      dir.applyEuler(new THREE.Euler(0, yaw, 0));
      camera.position.addScaledVector(dir, speed * dt);
    }
    camera.position.y = 1.7;
    camera.position.x = Math.max(-28, Math.min(28, camera.position.x));
    camera.position.z = Math.max(-13, Math.min(13, camera.position.z));

    // Proximity hint
    let nearest = Infinity, nearCar = null;
    carMeshes.forEach(cm => {
      const d = camera.position.distanceTo(new THREE.Vector3(...cm.data.position));
      if (d < nearest) { nearest = d; nearCar = cm; }
    });
    const selEl = document.getElementById('selected-car');
    if (nearest < 5) {
      selEl.textContent = `${nearCar.data.brand} ${nearCar.data.name} — Haz clic para ver`;
      selEl.classList.add('show');
    } else {
      selEl.classList.remove('show');
    }
  }

  renderer.render(scene, camera);
}

// ===================== LOADER =====================
window.addEventListener('load', () => {
  const bar = document.getElementById('loader-bar');
  const hint = document.getElementById('loader-hint');
  const btn = document.getElementById('enter-btn');
  bar.style.width = '100%';
  setTimeout(() => { hint.textContent = 'Preparando exposición...'; }, 600);
  setTimeout(() => { hint.textContent = 'Museo listo'; btn.style.display = 'block'; }, 2000);
});

function enterMuseum() {
  document.getElementById('loader').classList.add('hidden');
  animate();
  setTimeout(() => canvas.requestPointerLock(), 500);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
