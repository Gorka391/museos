<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Museo VR — Coches Clásicos Legendarios</title>
  <meta name="description" content="Museo virtual inmersivo con coches clásicos legendarios en 3D. Ferrari, Mercedes, Jaguar, Porsche y más.">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body{margin:0;padding:0;background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif}
    #loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0a0a0a,#1a1a2e);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 1s}
    #loading-screen h1{color:#d4af37;font-size:2.5em;letter-spacing:8px;text-transform:uppercase;margin-bottom:10px}
    #loading-screen p{color:#888;font-size:1em;letter-spacing:3px}
    .gold-line{width:200px;height:2px;background:linear-gradient(90deg,transparent,#d4af37,transparent);margin:20px 0;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
    #info-panel{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(10,10,10,.92);border:1px solid #d4af37;border-radius:12px;padding:20px 30px;color:#fff;z-index:100;display:none;max-width:500px;backdrop-filter:blur(10px);text-align:center}
    #info-panel h2{color:#d4af37;margin:0 0 8px;font-size:1.3em;letter-spacing:2px}
    #info-panel .specs{color:#bbb;font-size:.9em;line-height:1.6}
    #info-panel .close-btn{position:absolute;top:8px;right:12px;color:#d4af37;cursor:pointer;font-size:1.2em;background:none;border:none}
  </style>
</head>
<body>

<div id="loading-screen">
  <h1>Museo Clásicos</h1>
  <div class="gold-line"></div>
  <p>Cargando experiencia VR...</p>
</div>

<div id="info-panel">
  <button class="close-btn" onclick="this.parentElement.style.display='none'">&times;</button>
  <h2 id="info-name"></h2>
  <div id="info-specs" class="specs"></div>
</div>

<a-scene renderer="antialias:true;colorManagement:true" fog="type:exponential;color:#080810;density:0.012" loading-screen="enabled:false">

<script>
// Remove loading screen
document.querySelector('a-scene').addEventListener('loaded',()=>{
  const ls=document.getElementById('loading-screen');
  ls.style.opacity='0';setTimeout(()=>ls.remove(),1200);
});

// ========== ROTATING PEDESTAL ==========
AFRAME.registerComponent('rotate-pedestal',{
  schema:{speed:{type:'number',default:0.15}},
  tick:function(t,dt){this.el.object3D.rotation.y+=this.data.speed*dt*0.001;}
});

// ========== SHOW INFO ON CLICK ==========
AFRAME.registerComponent('car-info',{
  schema:{
    name:{type:'string'},
    year:{type:'string'},
    engine:{type:'string'},
    power:{type:'string'},
    speed:{type:'string'},
    production:{type:'string'},
    origin:{type:'string'},
    price:{type:'string'}
  },
  init:function(){
    this.el.addEventListener('click',()=>{
      const d=this.data;
      document.getElementById('info-name').textContent=d.name+' ('+d.year+')';
      document.getElementById('info-specs').innerHTML=
        '🏴 '+d.origin+'<br>'+
        '🔧 Motor: '+d.engine+'<br>'+
        '⚡ Potencia: '+d.power+'<br>'+
        '💨 Vel. Max: '+d.speed+'<br>'+
        '🏭 Producción: '+d.production+'<br>'+
        '💰 Valor actual: '+d.price;
      document.getElementById('info-panel').style.display='block';
    });
  }
});

// ========== DETAILED CAR BUILDER ==========
AFRAME.registerComponent('classic-car',{
  schema:{
    type:{type:'string',default:'sedan'},
    bodyColor:{type:'color',default:'#cc0000'},
    accentColor:{type:'color',default:'#222'},
    trimColor:{type:'color',default:'#c0c0c0'},
    bodyLength:{type:'number',default:4.0},
    bodyWidth:{type:'number',default:1.7},
    bodyHeight:{type:'number',default:0.55},
    cabinLength:{type:'number',default:1.8},
    cabinHeight:{type:'number',default:0.55},
    cabinOffset:{type:'number',default:0},
    wheelRadius:{type:'number',default:0.3},
    hoodLength:{type:'number',default:0},
    hasFins:{type:'boolean',default:false},
    hasRoundHeadlights:{type:'boolean',default:true},
    frontStyle:{type:'string',default:'normal'},
    rearStyle:{type:'string',default:'normal'},
  },
  init:function(){
    const d=this.data, el=this.el;
    const bL=d.bodyLength, bW=d.bodyWidth, bH=d.bodyHeight;
    const cL=d.cabinLength, cH=d.cabinHeight;
    const wR=d.wheelRadius, baseY=wR+0.06;

    // CHASSIS
    this.addBox(el,bL*0.95,0.08,bW*0.85,`0 ${baseY-0.04} 0`,'#0a0a0a','roughness:0.9');

    // MAIN BODY - lower
    this.addBox(el,bL,bH,bW,`0 ${baseY+bH/2} 0`,d.bodyColor,'roughness:0.25;metalness:0.6');

    // HOOD (longer for classic sports)
    const hoodL=d.hoodLength||bL*0.3;
    this.addBox(el,hoodL,bH*0.85,bW*0.95,`${bL/2-hoodL/2} ${baseY+bH*0.42} 0`,d.bodyColor,'roughness:0.2;metalness:0.65');

    // CABIN
    const cabY=baseY+bH+cH/2;
    this.addBox(el,cL,cH,bW*0.88,`${d.cabinOffset} ${cabY} 0`,'#1a1a2a','roughness:0.1;metalness:0.2;opacity:0.65;transparent:true');

    // WINDSHIELD front
    this.addBox(el,0.04,cH*0.85,bW*0.82,`${d.cabinOffset+cL/2+0.12} ${cabY} 0`,'#1a2a4a','opacity:0.45;transparent:true;metalness:0.9',`0 0 18`);

    // WINDSHIELD rear
    this.addBox(el,0.04,cH*0.8,bW*0.78,`${d.cabinOffset-cL/2-0.1} ${cabY} 0`,'#1a2a4a','opacity:0.45;transparent:true;metalness:0.9',`0 0 -18`);

    // ROOF
    this.addBox(el,cL*0.92,0.06,bW*0.85,`${d.cabinOffset} ${baseY+bH+cH+0.03} 0`,d.bodyColor,'roughness:0.2;metalness:0.6');

    // CHROME TRIM lines
    this.addBox(el,bL*1.01,0.03,bW*0.01,`0 ${baseY+bH*0.6} ${bW/2}`,d.trimColor,'roughness:0.1;metalness:0.95');
    this.addBox(el,bL*1.01,0.03,bW*0.01,`0 ${baseY+bH*0.6} ${-bW/2}`,d.trimColor,'roughness:0.1;metalness:0.95');

    // BUMPERS chrome
    this.addBox(el,0.1,0.18,bW+0.06,`${bL/2+0.04} ${baseY+0.12} 0`,d.trimColor,'roughness:0.1;metalness:0.9');
    this.addBox(el,0.1,0.18,bW+0.06,`${-bL/2-0.04} ${baseY+0.12} 0`,d.trimColor,'roughness:0.1;metalness:0.9');

    // GRILLE
    this.addBox(el,0.05,0.28,bW*0.45,`${bL/2+0.01} ${baseY+bH*0.35} 0`,d.accentColor,'roughness:0.2;metalness:0.8');

    // HEADLIGHTS (round for classic)
    if(d.hasRoundHeadlights){
      [-1,1].forEach(s=>{
        const hl=document.createElement('a-cylinder');
        hl.setAttribute('radius',0.12);hl.setAttribute('height',0.06);
        hl.setAttribute('rotation','0 0 90');
        hl.setAttribute('position',`${bL/2+0.03} ${baseY+bH*0.55} ${s*bW*0.32}`);
        hl.setAttribute('color','#ffffdd');
        hl.setAttribute('material','emissive:#ffffaa;emissiveIntensity:0.4;metalness:0.8');
        el.appendChild(hl);
        // Chrome ring
        const ring=document.createElement('a-torus');
        ring.setAttribute('radius',0.12);ring.setAttribute('radius-tubular',0.015);
        ring.setAttribute('rotation','0 0 90');
        ring.setAttribute('position',`${bL/2+0.05} ${baseY+bH*0.55} ${s*bW*0.32}`);
        ring.setAttribute('color',d.trimColor);
        ring.setAttribute('material','roughness:0.1;metalness:0.95');
        el.appendChild(ring);
      });
    }

    // TAILLIGHTS
    [-1,1].forEach(s=>{
      const tl=document.createElement('a-cylinder');
      tl.setAttribute('radius',0.08);tl.setAttribute('height',0.05);
      tl.setAttribute('rotation','0 0 90');
      tl.setAttribute('position',`${-bL/2-0.02} ${baseY+bH*0.45} ${s*bW*0.32}`);
      tl.setAttribute('color','#ff1111');
      tl.setAttribute('material','emissive:#ff0000;emissiveIntensity:0.5');
      el.appendChild(tl);
    });

    // SIDE MIRRORS
    [-1,1].forEach(s=>{
      this.addBox(el,0.08,0.06,0.1,`${d.cabinOffset+cL/2+0.05} ${cabY} ${s*(bW/2+0.08)}`,d.bodyColor,'roughness:0.2;metalness:0.6');
    });

    // FINS (for 50s/60s cars)
    if(d.hasFins){
      [-1,1].forEach(s=>{
        const fin=document.createElement('a-box');
        fin.setAttribute('width',0.6);fin.setAttribute('height',0.3);fin.setAttribute('depth',0.04);
        fin.setAttribute('position',`${-bL/2+0.3} ${baseY+bH+0.15} ${s*bW/2}`);
        fin.setAttribute('rotation',`0 0 ${s*-20}`);
        fin.setAttribute('color',d.bodyColor);
        fin.setAttribute('material','roughness:0.2;metalness:0.6');
        el.appendChild(fin);
      });
    }

    // WHEELS (detailed)
    const wPos=[
      {x:bL*0.32,z:bW/2+0.04},{x:bL*0.32,z:-bW/2-0.04},
      {x:-bL*0.32,z:bW/2+0.04},{x:-bL*0.32,z:-bW/2-0.04}
    ];
    wPos.forEach(wp=>{
      // Tire
      const tire=document.createElement('a-cylinder');
      tire.setAttribute('radius',wR);tire.setAttribute('height',0.2);
      tire.setAttribute('rotation','90 0 0');
      tire.setAttribute('position',`${wp.x} ${wR} ${wp.z}`);
      tire.setAttribute('color','#111');tire.setAttribute('material','roughness:0.95');
      el.appendChild(tire);
      // Whitewall
      const ww=document.createElement('a-torus');
      ww.setAttribute('radius',wR*0.82);ww.setAttribute('radius-tubular',0.025);
      ww.setAttribute('rotation','90 0 0');
      ww.setAttribute('position',`${wp.x} ${wR} ${wp.z+(wp.z>0?0.1:-0.1)}`);
      ww.setAttribute('color','#f5f0e0');ww.setAttribute('material','roughness:0.5');
      el.appendChild(ww);
      // Hub
      const hub=document.createElement('a-cylinder');
      hub.setAttribute('radius',wR*0.35);hub.setAttribute('height',0.22);
      hub.setAttribute('rotation','90 0 0');
      hub.setAttribute('position',`${wp.x} ${wR} ${wp.z}`);
      hub.setAttribute('color',d.trimColor);hub.setAttribute('material','roughness:0.1;metalness:0.9');
      el.appendChild(hub);
    });

    // DOOR LINES
    [-1,1].forEach(s=>{
      this.addBox(el,0.02,bH*0.9,0.02,`${d.cabinOffset+cL*0.3} ${baseY+bH*0.55} ${s*bW/2+s*0.01}`,'#111','roughness:0.5');
      this.addBox(el,0.02,bH*0.9,0.02,`${d.cabinOffset-cL*0.15} ${baseY+bH*0.55} ${s*bW/2+s*0.01}`,'#111','roughness:0.5');
    });

    // DOOR HANDLES
    [-1,1].forEach(s=>{
      this.addBox(el,0.12,0.03,0.02,`${d.cabinOffset+cL*0.1} ${baseY+bH*0.7} ${s*bW/2+s*0.02}`,d.trimColor,'roughness:0.1;metalness:0.9');
    });
  },
  addBox:function(parent,w,h,dp,pos,col,mat,rot){
    const b=document.createElement('a-box');
    b.setAttribute('width',w);b.setAttribute('height',h);b.setAttribute('depth',dp);
    b.setAttribute('position',pos);b.setAttribute('color',col);
    b.setAttribute('material',mat);
    if(rot)b.setAttribute('rotation',rot);
    parent.appendChild(b);
  }
});

// ========== BUILD MUSEUM ==========
document.addEventListener('DOMContentLoaded',()=>{
  const scene=document.querySelector('a-scene');
  const cols=4,spacingX=10,spacingZ=10;
  const startX=-(cols-1)*spacingX/2;
  const startZ=-10;

  CLASSICS.forEach((car,i)=>{
    const row=Math.floor(i/cols),col=i%cols;
    const px=startX+col*spacingX, pz=startZ+row*spacingZ;

    // Pedestal group
    const group=document.createElement('a-entity');
    group.setAttribute('position',`${px} 0 ${pz}`);

    // Marble pedestal base
    const base=document.createElement('a-cylinder');
    base.setAttribute('radius',2.8);base.setAttribute('height',0.2);
    base.setAttribute('position','0 0.1 0');
    base.setAttribute('color','#1a1a22');
    base.setAttribute('material','roughness:0.12;metalness:0.7');
    group.appendChild(base);

    // Gold ring
    const ring=document.createElement('a-torus');
    ring.setAttribute('radius',2.8);ring.setAttribute('radius-tubular',0.03);
    ring.setAttribute('rotation','90 0 0');ring.setAttribute('position','0 0.21 0');
    ring.setAttribute('color','#d4af37');
    ring.setAttribute('material','roughness:0.15;metalness:0.9');
    group.appendChild(ring);

    // Inner platform (glass effect)
    const inner=document.createElement('a-cylinder');
    inner.setAttribute('radius',2.5);inner.setAttribute('height',0.06);
    inner.setAttribute('position','0 0.22 0');
    inner.setAttribute('color','#111118');
    inner.setAttribute('material','roughness:0.05;metalness:0.8');
    group.appendChild(inner);

    // Rotating car wrapper
    const rotator=document.createElement('a-entity');
    rotator.setAttribute('position','0 0.25 0');
    rotator.setAttribute('rotate-pedestal','speed:0.12');

    // Car entity
    const carEnt=document.createElement('a-entity');
    carEnt.setAttribute('rotation','0 90 0');
    carEnt.setAttribute('class','clickable');
    carEnt.setAttribute('car-info',{
      name:car.name,year:car.year,engine:car.engine,power:car.power,
      speed:car.speed,production:car.production,origin:car.origin,price:car.price
    });
    carEnt.setAttribute('classic-car',{
      bodyColor:car.color,accentColor:car.accent,trimColor:car.trim,
      bodyLength:car.bL,bodyWidth:car.bW,bodyHeight:car.bH,
      cabinLength:car.cL,cabinHeight:car.cH,cabinOffset:car.cO,
      wheelRadius:car.wR,hoodLength:car.hL,hasFins:car.fins,
      hasRoundHeadlights:car.round
    });
    rotator.appendChild(carEnt);
    group.appendChild(rotator);

    // SPOTLIGHT per car
    const spot=document.createElement('a-light');
    spot.setAttribute('type','spot');spot.setAttribute('color','#fffaf0');
    spot.setAttribute('intensity','2');spot.setAttribute('position','0 7 0');
    spot.setAttribute('rotation','-90 0 0');spot.setAttribute('angle','30');
    spot.setAttribute('penumbra','0.5');spot.setAttribute('decay','1.5');
    group.appendChild(spot);

    // Gold glow underneath
    const glow=document.createElement('a-light');
    glow.setAttribute('type','point');glow.setAttribute('color','#d4af37');
    glow.setAttribute('intensity','0.12');glow.setAttribute('distance','4');
    glow.setAttribute('position','0 0.3 0');
    group.appendChild(glow);

    // NAME PLAQUE
    const plaque=document.createElement('a-entity');
    plaque.setAttribute('position','0 0.8 -3.2');

    const pBack=document.createElement('a-plane');
    pBack.setAttribute('width',3.5);pBack.setAttribute('height',1.2);
    pBack.setAttribute('color','#0c0c14');pBack.setAttribute('material','roughness:0.3');
    plaque.appendChild(pBack);

    const pBorder=document.createElement('a-plane');
    pBorder.setAttribute('width',3.6);pBorder.setAttribute('height',1.3);
    pBorder.setAttribute('color','#d4af37');pBorder.setAttribute('position','0 0 -0.005');
    plaque.appendChild(pBorder);

    const nameT=document.createElement('a-text');
    nameT.setAttribute('value',car.name);nameT.setAttribute('align','center');
    nameT.setAttribute('position','0 0.25 0.02');nameT.setAttribute('width',3.2);
    nameT.setAttribute('color','#d4af37');nameT.setAttribute('font','mozillavr');
    plaque.appendChild(nameT);

    const yearT=document.createElement('a-text');
    yearT.setAttribute('value',car.year+' · '+car.origin);
    yearT.setAttribute('align','center');yearT.setAttribute('position','0 0 0.02');
    yearT.setAttribute('width',2.5);yearT.setAttribute('color','#e0e0e0');
    plaque.appendChild(yearT);

    const engT=document.createElement('a-text');
    engT.setAttribute('value',car.engine+' — '+car.power);
    engT.setAttribute('align','center');engT.setAttribute('position','0 -0.25 0.02');
    engT.setAttribute('width',2.2);engT.setAttribute('color','#999');
    plaque.appendChild(engT);

    group.appendChild(plaque);
    scene.appendChild(group);
  });
});
