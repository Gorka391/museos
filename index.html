<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museo VR — Coches Clásicos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syncopate:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Cormorant Garamond', serif; }
  #canvas { display: block; }
  #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  #title-bar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 28px 48px;
    display: flex; align-items: flex-start; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
  }
  #museum-name { font-family: 'Syncopate', sans-serif; font-size: 13px; letter-spacing: 6px; color: #d4a843; text-transform: uppercase; font-weight: 700; }
  #museum-sub { font-size: 13px; letter-spacing: 2px; color: rgba(212,168,67,0.5); margin-top: 4px; font-style: italic; }
  #controls-hint {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 32px; align-items: center;
    background: rgba(0,0,0,0.6); border: 1px solid rgba(212,168,67,0.15);
    padding: 12px 32px; backdrop-filter: blur(12px);
    color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 2px;
    font-family: 'Syncopate', sans-serif;
  }
  .hint-key { background: rgba(212,168,67,0.12); border: 1px solid rgba(212,168,67,0.25); padding: 3px 10px; color: #d4a843; font-size: 9px; letter-spacing: 2px; }
  #info-panel {
    position: absolute; right: 0; top: 50%; transform: translateY(-50%) translateX(30px);
    width: 360px; pointer-events: all;
    background: linear-gradient(135deg, rgba(4,4,8,0.95) 0%, rgba(8,8,16,0.92) 100%);
    border-left: 1px solid rgba(212,168,67,0.4);
    border-top: 1px solid rgba(212,168,67,0.15);
    border-bottom: 1px solid rgba(212,168,67,0.15);
    backdrop-filter: blur(24px); padding: 44px 40px;
    opacity: 0; transition: opacity 0.6s cubic-bezier(0.4,0,0.2,1), transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  #info-panel.visible { opacity: 1; transform: translateY(-50%) translateX(0); }
  #info-year { font-family: 'Syncopate', sans-serif; font-size: 10px; letter-spacing: 6px; color: #d4a843; text-transform: uppercase; margin-bottom: 12px; }
  #info-name { font-size: 42px; font-weight: 300; color: #fff; line-height: 1.0; margin-bottom: 4px; font-style: italic; }
  #info-brand { font-family: 'Syncopate', sans-serif; font-size: 10px; letter-spacing: 5px; color: rgba(255,255,255,0.35); text-transform: uppercase; margin-bottom: 32px; }
  .info-divider { width: 48px; height: 1px; background: linear-gradient(to right, #d4a843, transparent); margin-bottom: 28px; }
  #info-desc { font-size: 15px; line-height: 1.9; color: rgba(255,255,255,0.6); margin-bottom: 32px; font-weight: 300; }
  .info-specs { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
  .spec-item { border-top: 1px solid rgba(212,168,67,0.15); padding-top: 14px; }
  .spec-label { font-family: 'Syncopate', sans-serif; font-size: 8px; letter-spacing: 3px; color: rgba(212,168,67,0.55); text-transform: uppercase; margin-bottom: 5px; }
  .spec-value { font-size: 22px; color: #fff; font-weight: 300; letter-spacing: 1px; }
  #car-nav { display: flex; gap: 10px; justify-content: center; }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(212,168,67,0.15); border: 1px solid rgba(212,168,67,0.3); cursor: pointer; transition: all 0.3s; pointer-events: all; }
  .nav-dot.active { background: #d4a843; transform: scale(1.3); }
  #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 16px; height: 16px; }
  #crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(212,168,67,0.6); }
  #crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  #crosshair::after { width: 100%; height: 1px; top: 50%; left: 0; }
  #crosshair-dot { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; border-radius: 50%; background: #d4a843; transform: translate(-50%, -50%); }
  #proximity-label {
    position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    font-family: 'Syncopate', sans-serif; font-size: 9px; letter-spacing: 5px; color: rgba(212,168,67,0.8);
    text-transform: uppercase; text-align: center;
    background: rgba(0,0,0,0.6); padding: 10px 24px; border: 1px solid rgba(212,168,67,0.2);
    backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #proximity-label.show { opacity: 1; }
  #loader {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; transition: opacity 1.2s;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-title { font-family: 'Syncopate', sans-serif; font-size: 32px; color: #d4a843; letter-spacing: 12px; margin-bottom: 6px; font-weight: 700; }
  .loader-sub { font-size: 16px; letter-spacing: 3px; color: rgba(212,168,67,0.45); margin-bottom: 56px; font-style: italic; }
  .loader-bar-wrap { width: 240px; height: 1px; background: rgba(212,168,67,0.15); }
  .loader-bar { height: 1px; background: #d4a843; width: 0; transition: width 3s ease; }
  .loader-hint { margin-top: 28px; font-family: 'Syncopate', sans-serif; font-size: 9px; letter-spacing: 4px; color: rgba(255,255,255,0.25); text-transform: uppercase; }
  #enter-btn {
    margin-top: 40px; padding: 16px 56px;
    background: transparent; border: 1px solid #d4a843;
    color: #d4a843; font-family: 'Syncopate', sans-serif;
    font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
    cursor: pointer; transition: all 0.4s; display: none;
  }
  #enter-btn:hover { background: #d4a843; color: #000; }
  #loading-cars {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    font-family: 'Syncopate', sans-serif; font-size: 9px; letter-spacing: 3px;
    color: rgba(212,168,67,0.5); text-transform: uppercase; z-index: 20;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-title">MUSEO</div>
  <div class="loader-sub">Colección de Automóviles Históricos</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-hint" id="loader-hint">Iniciando...</div>
  <button id="enter-btn" onclick="enterMuseum()">Entrar al Museo</button>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="title-bar">
    <div>
      <div id="museum-name">Museo Automovilístico</div>
      <div id="museum-sub">Colección Permanente · Vehículos Históricos</div>
    </div>
    <div style="font-family:'Syncopate',sans-serif;font-size:9px;letter-spacing:4px;color:rgba(212,168,67,0.4);">EST. MMXXV</div>
  </div>
  <div id="crosshair"><div id="crosshair-dot"></div></div>
  <div id="info-panel">
    <div id="info-year"></div>
    <div id="info-name"></div>
    <div id="info-brand"></div>
    <div class="info-divider"></div>
    <div id="info-desc"></div>
    <div class="info-specs" id="info-specs"></div>
    <div id="car-nav"></div>
  </div>
  <div id="proximity-label"></div>
  <div id="controls-hint">
    <span><span class="hint-key">WASD</span> Mover</span>
    <span><span class="hint-key">RATÓN</span> Mirar</span>
    <span><span class="hint-key">CLIC</span> Inspeccionar</span>
    <span><span class="hint-key">ESC</span> Soltar</span>
  </div>
</div>
<div id="loading-cars"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===================== CAR DATA =====================
const CARS = [
  {
    id: 0, name: "Model T", brand: "Ford", year: "1908",
    // GLB real: coche low-poly clasico de Sketchfab (CC0)
    modelUrl: 'https://vazxmixjsiawhamofees.supabase.co/storage/v1/object/public/models/truck/model.gltf',
    scale: 1.4, yOffset: 0,
    desc: "El primer automóvil producido en masa. Henry Ford democratizó el transporte con la cadena de montaje, cambiando la civilización para siempre.",
    specs: [{label:"Motor",value:"4 cil."},{label:"Potencia",value:"20 CV"},{label:"Vel. máx.",value:"72 km/h"},{label:"Producción",value:"15M"}],
    position: [-14, 0, 0]
  },
  {
    id: 1, name: "Cybertruck", brand: "Tesla", year: "2023",
    modelUrl: 'https://vazxmixjsiawhamofees.supabase.co/storage/v1/object/public/models/cybertruck/model.gltf',
    scale: 1.0, yOffset: 0,
    desc: "El vehículo eléctrico más radical de Tesla. Carrocería de acero inoxidable ultraresistente, autonomía de 800km y diseño que rompió todos los moldes.",
    specs: [{label:"Motor",value:"Eléctrico"},{label:"Potencia",value:"800 CV"},{label:"0-100",value:"2.9 s"},{label:"Autonomía",value:"800 km"}],
    position: [-7, 0, 0]
  },
  {
    id: 2, name: "Low Rider", brand: "Chevrolet", year: "1964",
    modelUrl: 'https://vazxmixjsiawhamofees.supabase.co/storage/v1/object/public/models/low-poly-car/model.gltf',
    scale: 1.2, yOffset: 0,
    desc: "Icono de la cultura chicana. El Impala de 1964 es el low rider por excelencia, con suspensión hidráulica y acabados cromados que son arte en movimiento.",
    specs: [{label:"Motor",value:"V8"},{label:"Potencia",value:"250 CV"},{label:"Estilo",value:"Low Rider"},{label:"Cultura",value:"Chicana"}],
    position: [0, 0, 0]
  },
  {
    id: 3, name: "Buggy", brand: "Dune", year: "1970",
    modelUrl: 'https://vazxmixjsiawhamofees.supabase.co/storage/v1/object/public/models/buggy/model.gltf',
    scale: 1.1, yOffset: 0,
    desc: "El espíritu libre del off-road. Chasis de acero tubular, motor trasero y sin puertas. Diseñado para dominar dunas y terrenos imposibles.",
    specs: [{label:"Motor",value:"4 cil."},{label:"Peso",value:"450 kg"},{label:"Tipo",value:"Off-road"},{label:"Tracción",value:"RWD"}],
    position: [7, 0, 0]
  },
  {
    id: 4, name: "Racecar F1", brand: "Formula", year: "2021",
    modelUrl: 'https://vazxmixjsiawhamofees.supabase.co/storage/v1/object/public/models/race-car/model.gltf',
    scale: 1.0, yOffset: 0,
    desc: "La cima de la ingeniería automovilística. Fuerzas G de 5g en curvas, neumáticos calentados a 110°C y aerodinámica que genera más fuerza de empuje que su propio peso.",
    specs: [{label:"Motor",value:"V6 Híbrido"},{label:"Potencia",value:"1000 CV"},{label:"Vel. máx.",value:"380 km/h"},{label:"Peso",value:"798 kg"}],
    position: [14, 0, 0]
  }
];

// ===================== THREE SETUP =====================
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03030a);
scene.fog = new THREE.FogExp2(0x03030a, 0.028);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.05, 200);
camera.position.set(0, 1.65, 10);

// ===================== LIGHTING =====================
function setupLighting() {
  scene.add(new THREE.AmbientLight(0x0a0a1a, 0.8));
  scene.add(new THREE.HemisphereLight(0x1a1a2e, 0x0a0510, 0.5));

  CARS.forEach(car => {
    const spot = new THREE.SpotLight(0xfff0d8, 3.5, 22, 0.28, 0.5, 1.5);
    spot.position.set(car.position[0], 9.8, car.position[2] - 0.5);
    spot.target.position.set(car.position[0], 0.3, car.position[2]);
    spot.castShadow = true;
    spot.shadow.mapSize.width = 1024;
    spot.shadow.mapSize.height = 1024;
    spot.shadow.bias = -0.001;
    scene.add(spot);
    scene.add(spot.target);

    const rim = new THREE.SpotLight(0x4488cc, 1.2, 12, 0.4, 0.6);
    rim.position.set(car.position[0], 3.5, car.position[2] - 5);
    rim.target.position.set(car.position[0], 0.8, car.position[2]);
    scene.add(rim); scene.add(rim.target);

    const fill = new THREE.PointLight(0xffe8c0, 0.5, 7);
    fill.position.set(car.position[0], 1.8, car.position[2] + 4);
    scene.add(fill);
  });

  for (let x = -27; x <= 27; x += 9) {
    scene.add(Object.assign(new THREE.PointLight(0x1a2244, 0.4, 12), {position: new THREE.Vector3(x, 6, -14.5)}));
    scene.add(Object.assign(new THREE.PointLight(0x1a2244, 0.3, 10), {position: new THREE.Vector3(x, 6, 14.5)}));
  }
}
setupLighting();

// ===================== MUSEUM ARCHITECTURE =====================
function buildMuseum() {
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x080810, roughness: 0.05, metalness: 0.8 });
  const floor = new THREE.Mesh(new THREE.PlaneGeometry(70, 35), floorMat);
  floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
  scene.add(floor);

  const tileMat = new THREE.MeshStandardMaterial({ color: 0x0d0d1a, roughness: 0.2, metalness: 0.3 });
  for (let ix = -3; ix <= 3; ix++) for (let iz = -5; iz <= 5; iz++) {
    const tile = new THREE.Mesh(new THREE.PlaneGeometry(4.95, 2.95), tileMat);
    tile.rotation.x = -Math.PI / 2; tile.position.set(ix * 5, 0.001, iz * 3);
    scene.add(tile);
  }

  const ceilMat = new THREE.MeshStandardMaterial({ color: 0x060610, roughness: 1.0 });
  const ceil = new THREE.Mesh(new THREE.PlaneGeometry(70, 35), ceilMat);
  ceil.rotation.x = Math.PI / 2; ceil.position.y = 10;
  scene.add(ceil);

  const cornMat = new THREE.MeshStandardMaterial({ color: 0xd4a843, roughness: 0.05, metalness: 1.0 });
  CARS.forEach(car => {
    const pedMat = new THREE.MeshStandardMaterial({ color: 0x0c0c18, roughness: 0.1, metalness: 0.9 });
    const ped = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.18, 2.2), pedMat);
    ped.position.set(car.position[0], 0.09, car.position[2]); ped.receiveShadow = true;
    scene.add(ped);
    const edge = new THREE.Mesh(new THREE.BoxGeometry(3.42, 0.025, 2.22), cornMat);
    edge.position.set(car.position[0], 0.185, car.position[2]);
    scene.add(edge);
    const housing = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.4, 0.25, 12), cornMat);
    housing.position.set(car.position[0], 9.87, car.position[2]);
    scene.add(housing);
    const inner = new THREE.Mesh(new THREE.CircleGeometry(0.2, 12), new THREE.MeshStandardMaterial({ color: 0xfff8e0, emissive: 0xfff8e0, emissiveIntensity: 1.5 }));
    inner.rotation.x = Math.PI / 2; inner.position.set(car.position[0], 9.74, car.position[2]);
    scene.add(inner);
  });

  const wallMat = new THREE.MeshStandardMaterial({ color: 0x0a0a14, roughness: 0.95 });
  [
    { geo:[70,10], pos:[0,5,-17.5], rot:[0,0,0] },
    { geo:[70,10], pos:[0,5,17.5],  rot:[0,Math.PI,0] },
    { geo:[35,10], pos:[-35,5,0],   rot:[0,Math.PI/2,0] },
    { geo:[35,10], pos:[35,5,0],    rot:[0,-Math.PI/2,0] }
  ].forEach(w => {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(...w.geo), wallMat);
    m.position.set(...w.pos); m.rotation.set(...w.rot); scene.add(m);
  });

  [-34.9, 34.9].forEach(x => {
    const c = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.35, 35), cornMat);
    c.position.set(x, 9.3, 0); scene.add(c);
  });
  [-17.4, 17.4].forEach(z => {
    const c = new THREE.Mesh(new THREE.BoxGeometry(70, 0.35, 0.06), cornMat);
    c.position.set(0, 9.3, z); scene.add(c);
  });

  const colMat = new THREE.MeshStandardMaterial({ color: 0x0d0d1c, roughness: 0.6, metalness: 0.3 });
  const capMat = new THREE.MeshStandardMaterial({ color: 0xd4a843, roughness: 0.1, metalness: 0.9 });
  [-21, -7, 7, 21].forEach(x => {
    [-10, 10].forEach(z => {
      const col = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.28, 10, 16), colMat);
      col.position.set(x, 5, z); col.castShadow = true; scene.add(col);
      const cap = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.15, 0.8), capMat);
      cap.position.set(x, 10.07, z); scene.add(cap);
    });
  });

  const refl = new THREE.Mesh(new THREE.PlaneGeometry(70, 35),
    new THREE.MeshStandardMaterial({ color: 0x0a0a14, roughness: 0.0, metalness: 1.0, transparent: true, opacity: 0.25 }));
  refl.rotation.x = -Math.PI / 2; refl.position.y = 0.002; scene.add(refl);
}
buildMuseum();

// ===================== GLTF LOADER (sin importmap) =====================
// Cargamos GLTFLoader desde CDN de forma compatible con r128
const GLTF_LOADER_SRC = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';

const carMeshes = [];
let loadedCount = 0;
const loadingEl = document.getElementById('loading-cars');

function onScriptLoaded() {
  const loader = new THREE.GLTFLoader();
  CARS.forEach(car => {
    loadingEl.textContent = `Cargando modelos... ${loadedCount}/${CARS.length}`;
    loader.load(
      car.modelUrl,
      (gltf) => {
        const group = gltf.scene;
        // Normalizar tamaño
        const box = new THREE.Box3().setFromObject(group);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const targetSize = 2.8 * car.scale;
        const scaleFactor = targetSize / maxDim;
        group.scale.setScalar(scaleFactor);

        // Centrar en pedestal
        const box2 = new THREE.Box3().setFromObject(group);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        group.position.x = car.position[0] - center.x;
        group.position.z = car.position[2] - center.z;
        group.position.y = 0.2 - box2.min.y * scaleFactor + car.yOffset;

        group.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material) {
              child.material.envMapIntensity = 0.8;
            }
          }
        });

        scene.add(group);
        carMeshes.push({ group, data: car });

        loadedCount++;
        loadingEl.textContent = `Cargando modelos... ${loadedCount}/${CARS.length}`;
        if (loadedCount === CARS.length) {
          loadingEl.style.opacity = '0';
          setTimeout(() => loadingEl.style.display = 'none', 800);
        }
      },
      undefined,
      (err) => {
        console.warn('Error cargando modelo:', car.name, err);
        // Fallback: cubo con color si falla la carga
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(2.2, 1.0, 1.0),
          new THREE.MeshStandardMaterial({ color: 0x333355, roughness: 0.3, metalness: 0.8 })
        );
        fallback.position.set(car.position[0], 0.7, car.position[2]);
        fallback.castShadow = true;
        scene.add(fallback);
        carMeshes.push({ group: fallback, data: car });
        loadedCount++;
        if (loadedCount === CARS.length) {
          loadingEl.style.opacity = '0';
        }
      }
    );
  });
}

// Inyectar GLTFLoader script dinámicamente
const script = document.createElement('script');
script.src = GLTF_LOADER_SRC;
script.onload = onScriptLoaded;
document.head.appendChild(script);

// ===================== PARTICLES =====================
const particleCount = 500;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
const pSpeeds = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
  pPos[i*3] = (Math.random() - 0.5) * 60;
  pPos[i*3+1] = Math.random() * 10;
  pPos[i*3+2] = (Math.random() - 0.5) * 30;
  pSpeeds[i] = 0.2 + Math.random() * 0.8;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const pMat = new THREE.PointsMaterial({ color: 0xd4a843, size: 0.025, transparent: true, opacity: 0.35 });
scene.add(new THREE.Points(pGeo, pMat));

// ===================== CONTROLS =====================
const keys = {};
let isLocked = false;
let pitch = 0, yaw = 0;
const euler = new THREE.Euler(0, 0, 0, 'YXZ');

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('click', () => { if (!isLocked) canvas.requestPointerLock(); });
document.addEventListener('pointerlockchange', () => { isLocked = document.pointerLockElement === canvas; });
document.addEventListener('mousemove', e => {
  if (!isLocked) return;
  yaw -= e.movementX * 0.0018;
  pitch -= e.movementY * 0.0018;
  pitch = Math.max(-Math.PI / 2.8, Math.min(Math.PI / 2.8, pitch));
});

document.addEventListener('click', () => {
  if (!isLocked) return;
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
  const allMeshes = [];
  carMeshes.forEach(cm => {
    const obj = cm.group;
    if (obj.traverse) obj.traverse(m => { if (m.isMesh) allMeshes.push(m); });
    else if (obj.isMesh) allMeshes.push(obj);
  });
  const hits = raycaster.intersectObjects(allMeshes);
  if (hits.length > 0) {
    const hitObj = hits[0].object;
    for (const cm of carMeshes) {
      let found = false;
      const obj = cm.group;
      if (obj.traverse) obj.traverse(m => { if (m === hitObj) found = true; });
      else if (obj === hitObj) found = true;
      if (found) { showCarInfo(cm.data); break; }
    }
  }
});

document.addEventListener('keydown', e => {
  if (e.code === 'Escape') document.getElementById('info-panel').classList.remove('visible');
});

function showCarInfo(car) {
  document.getElementById('info-year').textContent = car.year;
  document.getElementById('info-name').textContent = car.name;
  document.getElementById('info-brand').textContent = car.brand;
  document.getElementById('info-desc').textContent = car.desc;
  const specsEl = document.getElementById('info-specs');
  specsEl.innerHTML = '';
  car.specs.forEach(s => {
    specsEl.innerHTML += `<div class="spec-item"><div class="spec-label">${s.label}</div><div class="spec-value">${s.value}</div></div>`;
  });
  const nav = document.getElementById('car-nav');
  nav.innerHTML = '';
  CARS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (c.id === car.id ? ' active' : '');
    dot.onclick = () => showCarInfo(c);
    nav.appendChild(dot);
  });
  document.getElementById('info-panel').classList.add('visible');
}

// ===================== ANIMATION LOOP =====================
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // Rotación suave de los coches
  carMeshes.forEach((cm, i) => {
    cm.group.rotation.y = Math.sin(t * 0.1 + i * 1.3) * 0.18;
  });

  // Partículas flotantes
  const pos = pGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    pos[i*3+1] += pSpeeds[i] * 0.0003;
    if (pos[i*3+1] > 10) pos[i*3+1] = 0;
  }
  pGeo.attributes.position.needsUpdate = true;

  if (isLocked) {
    euler.set(pitch, yaw, 0);
    camera.quaternion.setFromEuler(euler);
    const speed = keys['ShiftLeft'] ? 9 : 5;
    const dir = new THREE.Vector3();
    if (keys['KeyW'] || keys['ArrowUp']) dir.z -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) dir.z += 1;
    if (keys['KeyA'] || keys['ArrowLeft']) dir.x -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) dir.x += 1;
    if (dir.length() > 0) {
      dir.normalize().applyEuler(new THREE.Euler(0, yaw, 0));
      camera.position.addScaledVector(dir, speed * dt);
    }
    camera.position.y = 1.65;
    camera.position.x = Math.max(-32, Math.min(32, camera.position.x));
    camera.position.z = Math.max(-15, Math.min(14, camera.position.z));

    let nearest = Infinity, nearCar = null;
    carMeshes.forEach(cm => {
      const d = camera.position.distanceTo(new THREE.Vector3(...cm.data.position));
      if (d < nearest) { nearest = d; nearCar = cm; }
    });
    const lbl = document.getElementById('proximity-label');
    if (nearest < 5.5) {
      lbl.textContent = `${nearCar.data.brand} ${nearCar.data.name} · ${nearCar.data.year}`;
      lbl.classList.add('show');
    } else {
      lbl.classList.remove('show');
    }
  }

  renderer.render(scene, camera);
}

// ===================== LOADER =====================
window.addEventListener('load', () => {
  const bar = document.getElementById('loader-bar');
  const hint = document.getElementById('loader-hint');
  const btn = document.getElementById('enter-btn');
  setTimeout(() => { bar.style.width = '100%'; }, 100);
  setTimeout(() => { hint.textContent = 'Construyendo exposición...'; }, 800);
  setTimeout(() => { hint.textContent = 'Cargando modelos 3D...'; }, 1600);
  setTimeout(() => { hint.textContent = 'Museo listo'; btn.style.display = 'block'; }, 3000);
});

function enterMuseum() {
  document.getElementById('loader').classList.add('hidden');
  animate();
  setTimeout(() => canvas.requestPointerLock(), 600);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
