<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Museo de Arte — Galería Infinita VR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel+Decorative:wght@400;700&family=Raleway:wght@200;300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; overflow: hidden; font-family: 'Raleway', sans-serif; }

    /* ══════════════════════════════════
       PANTALLA DE CARGA
    ══════════════════════════════════ */
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: radial-gradient(ellipse at 50% 40%, #1a0a00 0%, #000 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2rem;
      transition: opacity 1.2s ease, visibility 1.2s ease;
    }
    #loading-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .loading-logo {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      color: #d4a853;
      letter-spacing: 0.25em;
      text-align: center;
      text-shadow: 0 0 40px rgba(212, 168, 83, 0.5);
      animation: logoGlow 2s ease-in-out infinite alternate;
    }
    @keyframes logoGlow {
      from { text-shadow: 0 0 20px rgba(212,168,83,0.3); }
      to   { text-shadow: 0 0 60px rgba(212,168,83,0.9), 0 0 100px rgba(212,168,83,0.3); }
    }
    .loading-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: #8b7355;
      letter-spacing: 0.3em;
    }
    .loading-bar-wrap {
      width: min(320px, 80vw);
      height: 2px;
      background: rgba(212,168,83,0.15);
      border-radius: 99px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%; width: 0;
      background: linear-gradient(90deg, #8b6020, #d4a853, #f0d080, #d4a853);
      border-radius: 99px;
      animation: barFill 3s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes barFill { to { width: 100%; } }
    .loading-hint {
      font-size: 0.72rem;
      color: #4a3f2f;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .ornament { color: #d4a853; font-size: 1.4rem; opacity: 0.6; }

    /* ══════════════════════════════════
       HUD SUPERIOR
    ══════════════════════════════════ */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.2rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease 3.5s;
    }
    #hud.visible { opacity: 1; }
    .hud-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.7rem, 1.8vw, 1rem);
      color: #d4a853;
      letter-spacing: 0.2em;
    }
    .hud-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.75rem;
      color: #7a6545;
      letter-spacing: 0.15em;
      font-style: italic;
    }
    .hud-controls {
      display: flex; gap: 1.5rem; align-items: center;
    }
    .hud-key {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.65rem; color: #6b5c40; letter-spacing: 0.1em;
    }
    .key-badge {
      background: rgba(212,168,83,0.15);
      border: 1px solid rgba(212,168,83,0.3);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.6rem;
      color: #d4a853;
    }

    /* ══════════════════════════════════
       PANEL DE OBRA (HOVER INFO)
    ══════════════════════════════════ */
    #artwork-panel {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(120%);
      z-index: 100;
      background: rgba(10, 7, 3, 0.92);
      border: 1px solid rgba(212, 168, 83, 0.35);
      border-radius: 2px;
      padding: 1.2rem 2rem;
      min-width: 280px; max-width: 420px;
      text-align: center;
      backdrop-filter: blur(12px);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }
    #artwork-panel.visible {
      transform: translateX(-50%) translateY(0);
    }
    .panel-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.95rem;
      color: #d4a853;
      margin-bottom: 0.3rem;
    }
    .panel-meta {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: #9e8a68;
      margin-bottom: 0.6rem;
    }
    .panel-desc {
      font-size: 0.72rem;
      color: #6b5c40;
      line-height: 1.7;
      letter-spacing: 0.03em;
    }
    .panel-divider {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, #d4a853, transparent);
      margin: 0.6rem auto;
    }

    /* ══════════════════════════════════
       MINIBRÚJULA
    ══════════════════════════════════ */
    #compass {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 100;
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(212,168,83,0.3);
      background: rgba(10,7,3,0.8);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.7rem;
      color: #d4a853;
      letter-spacing: 0.05em;
      backdrop-filter: blur(8px);
      opacity: 0;
      transition: opacity 1s ease 3.5s;
    }
    #compass.visible { opacity: 1; }

    /* Partículas flotantes de fondo */
    #particles-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     PANTALLA DE CARGA
══════════════════════════════════ -->
<div id="loading-screen">
  <div class="ornament">✦</div>
  <div class="loading-logo">GALERÍA INFINITA</div>
  <div class="loading-subtitle">Museo de Arte en Realidad Virtual</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
  <div class="loading-hint">Preparando la experiencia…</div>
  <div class="ornament" style="transform:rotate(180deg)">✦</div>
</div>

<!-- HUD -->
<div id="hud">
  <div>
    <div class="hud-title">GALERÍA INFINITA</div>
    <div class="hud-sub">Grandes Maestros del Arte Universal</div>
  </div>
  <div class="hud-controls">
    <div class="hud-key"><span class="key-badge">W A S D</span> Mover</div>
    <div class="hud-key"><span class="key-badge">Ratón</span> Mirar</div>
    <div class="hud-key"><span class="key-badge">Click</span> Info</div>
  </div>
</div>

<!-- Panel de obra -->
<div id="artwork-panel">
  <div class="panel-title" id="panel-title">—</div>
  <div class="panel-divider"></div>
  <div class="panel-meta" id="panel-meta">—</div>
  <div class="panel-desc" id="panel-desc">—</div>
</div>

<!-- Brújula -->
<div id="compass">N</div>

<!-- ══════════════════════════════════
     ESCENA A-FRAME
══════════════════════════════════ -->
<a-scene
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
  shadow="type: pcfsoft"
  fog="type: exponential; color: #0a0602; density: 0.018"
  vr-mode-ui="enabled: true"
>

  <!-- ══ RECURSOS ══ -->
  <a-assets timeout="15000">
    <img id="floor-tex"   src="https://cdn.aframe.io/a-painter/images/floor.jpg" crossorigin="anonymous">
    <img id="water-tex"   src="https://cdn.aframe.io/a-painter/images/sky.jpg" crossorigin="anonymous">

    <!-- Obras maestras -->
    <img id="monalisa"    src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ec/Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg/687px-Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg" crossorigin="anonymous">
    <img id="starry"      src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1200px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg" crossorigin="anonymous">
    <img id="wave"        src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/The_Great_Wave_off_Kanagawa.jpg/1200px-The_Great_Wave_off_Kanagawa.jpg" crossorigin="anonymous">
    <img id="pearl"       src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d7/Meisje_met_de_parel.jpg/800px-Meisje_met_de_parel.jpg" crossorigin="anonymous">
    <img id="persistence" src="https://upload.wikimedia.org/wikipedia/en/thumb/d/dd/The_Persistence_of_Memory.jpg/800px-The_Persistence_of_Memory.jpg" crossorigin="anonymous">
    <img id="creation"    src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Michelangelo_-_Creation_of_Adam_%28cropped%29.jpg/1200px-Michelangelo_-_Creation_of_Adam_%28cropped%29.jpg" crossorigin="anonymous">
    <img id="scream"      src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Edvard_Munch%2C_1893%2C_The_Scream%2C_oil%2C_tempera_and_pastel_on_cardboard%2C_91_x_73_cm%2C_National_Gallery_of_Norway.jpg/800px-Edvard_Munch%2C_1893%2C_The_Scream%2C_oil%2C_tempera_and_pastel_on_cardboard%2C_91_x_73_cm%2C_National_Gallery_of_Norway.jpg" crossorigin="anonymous">
    <img id="liberty"     src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Eug%C3%A8ne_Delacroix_-_La_libert%C3%A9_guidant_le_peuple.jpg/1200px-Eug%C3%A8ne_Delacroix_-_La_libert%C3%A9_guidant_le_peuple.jpg" crossorigin="anonymous">
  </a-assets>

  <!-- ══ CÁMARA Y CONTROLES ══ -->
  <a-entity id="rig" position="0 0 10">
    <a-camera
      look-controls="pointerLockEnabled: true"
      wasd-controls="acceleration: 80; fly: false"
      near="0.1" far="100"
    >
      <a-cursor
        fuse="false"
        raycaster="objects: .artwork"
        color="#d4a853"
        geometry="primitive: ring; radiusInner: 0.006; radiusOuter: 0.011"
        material="color: #d4a853; shader: flat; opacity: 0.9"
        animation__click="property: scale; startEvents: click; from: 1.5 1.5 1.5; to: 1 1 1; dur: 200"
      ></a-cursor>
    </a-camera>
  </a-entity>

  <!-- Mandos VR -->
  <a-entity laser-controls="hand: left"  raycaster="objects: .artwork"></a-entity>
  <a-entity laser-controls="hand: right" raycaster="objects: .artwork"></a-entity>

  <!-- ══ SKY ══ -->
  <a-sky color="#04020a"></a-sky>

  <!-- ══ ILUMINACIÓN ══ -->
  <a-light type="ambient"  color="#1a1008" intensity="3"></a-light>
  <!-- Cúpula central cálida -->
  <a-light type="point" intensity="0.6" position="0 7 0"   distance="30" color="#c8942a" decay="2"></a-light>
  <!-- Luces perimetrales frescas -->
  <a-light type="point" intensity="0.25" position="-12 6 -12" distance="20" color="#b0c8d4" decay="2"></a-light>
  <a-light type="point" intensity="0.25" position=" 12 6 -12" distance="20" color="#b0c8d4" decay="2"></a-light>
  <a-light type="point" intensity="0.25" position="-12 6  12" distance="20" color="#b0c8d4" decay="2"></a-light>
  <a-light type="point" intensity="0.25" position=" 12 6  12" distance="20" color="#b0c8d4" decay="2"></a-light>

  <!-- ══════════════════════
       ARQUITECTURA
  ══════════════════════ -->

  <!-- Suelo de mármol oscuro con veta -->
  <a-plane id="floor"
    src="#floor-tex" rotation="-90 0 0"
    width="42" height="42" repeat="12 12"
    material="roughness:0.4; metalness:0.35; color:#2a1f12"
  ></a-plane>

  <!-- Techo con moldura central -->
  <a-plane rotation="90 0 0" position="0 8.5 0" width="42" height="42" color="#0a0704" material="roughness:1"></a-plane>
  <!-- Moldura de techo (cinturón dorado) -->
  <a-box position="0 8.3 0" width="42" height="0.12" depth="42" color="#2c1f0a" material="roughness:0.5; metalness:0.6"></a-box>
  <!-- Medallón central del techo -->
  <a-torus position="0 8.45 0" rotation="90 0 0" radius="3" radius-tubular="0.08" color="#d4a853" material="roughness:0.3; metalness:0.8"></a-torus>
  <a-torus position="0 8.45 0" rotation="90 0 0" radius="5" radius-tubular="0.06" color="#8b6820" material="roughness:0.4; metalness:0.7"></a-torus>

  <!-- PAREDES PRINCIPALES (con zócalo y cornisa) -->
  <!-- Pared Norte (-Z) -->
  <a-box position="0 4.25 -16" width="32" height="8.5" depth="0.6" color="#1e1510" material="roughness:0.85"></a-box>
  <!-- Pared Sur (+Z) -->
  <a-box position="0 4.25  16" width="32" height="8.5" depth="0.6" color="#1e1510" material="roughness:0.85"></a-box>
  <!-- Pared Oeste (-X) -->
  <a-box position="-16 4.25 0" width="0.6" height="8.5" depth="32" color="#201610" material="roughness:0.85"></a-box>
  <!-- Pared Este (+X) -->
  <a-box position=" 16 4.25 0" width="0.6" height="8.5" depth="32" color="#201610" material="roughness:0.85"></a-box>

  <!-- Zócalos decorativos (franjas doradas bajas) -->
  <a-box position="0 0.3 -15.7"   width="32" height="0.5" depth="0.15" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-box>
  <a-box position="0 0.3  15.7"   width="32" height="0.5" depth="0.15" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-box>
  <a-box position="-15.7 0.3 0"  width="0.15" height="0.5" depth="32" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-box>
  <a-box position=" 15.7 0.3 0"  width="0.15" height="0.5" depth="32" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-box>

  <!-- Cornisas superiores -->
  <a-box position="0 8.1 -15.7"   width="32.4" height="0.4" depth="0.5" color="#2c1f0a" material="roughness:0.5;metalness:0.5"></a-box>
  <a-box position="0 8.1  15.7"   width="32.4" height="0.4" depth="0.5" color="#2c1f0a" material="roughness:0.5;metalness:0.5"></a-box>
  <a-box position="-15.7 8.1 0"  width="0.5" height="0.4" depth="32.4" color="#2c1f0a" material="roughness:0.5;metalness:0.5"></a-box>
  <a-box position=" 15.7 8.1 0"  width="0.5" height="0.4" depth="32.4" color="#2c1f0a" material="roughness:0.5;metalness:0.5"></a-box>

  <!-- COLUMNAS INTERIORES (8 columnas decorativas) -->
  <!-- Columnas Norte -->
  <a-entity position="-8 0 -10">
    <a-cylinder radius="0.45" height="8" color="#1c1208" material="roughness:0.7;metalness:0.2" segments-radial="16"></a-cylinder>
    <a-cylinder position="0 4.1 0" radius="0.65" height="0.3" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
    <a-cylinder position="0 -0.05 0" radius="0.65" height="0.2" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
  </a-entity>
  <a-entity position=" 8 0 -10">
    <a-cylinder radius="0.45" height="8" color="#1c1208" material="roughness:0.7;metalness:0.2" segments-radial="16"></a-cylinder>
    <a-cylinder position="0 4.1 0" radius="0.65" height="0.3" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
    <a-cylinder position="0 -0.05 0" radius="0.65" height="0.2" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
  </a-entity>
  <!-- Columnas Sur -->
  <a-entity position="-8 0 10">
    <a-cylinder radius="0.45" height="8" color="#1c1208" material="roughness:0.7;metalness:0.2" segments-radial="16"></a-cylinder>
    <a-cylinder position="0 4.1 0" radius="0.65" height="0.3" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
    <a-cylinder position="0 -0.05 0" radius="0.65" height="0.2" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
  </a-entity>
  <a-entity position=" 8 0 10">
    <a-cylinder radius="0.45" height="8" color="#1c1208" material="roughness:0.7;metalness:0.2" segments-radial="16"></a-cylinder>
    <a-cylinder position="0 4.1 0" radius="0.65" height="0.3" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
    <a-cylinder position="0 -0.05 0" radius="0.65" height="0.2" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
  </a-entity>
  <!-- Columnas esquina -->
  <a-entity position="-15 0 -15">
    <a-cylinder radius="0.55" height="8" color="#1a1107" material="roughness:0.7;metalness:0.2" segments-radial="16"></a-cylinder>
    <a-cylinder position="0 4.1 0" radius="0.75" height="0.35" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
  </a-entity>
  <a-entity position=" 15 0 -15">
    <a-cylinder radius="0.55" height="8" color="#1a1107" material="roughness:0.7;metalness:0.2" segments-radial="16"></a-cylinder>
    <a-cylinder position="0 4.1 0" radius="0.75" height="0.35" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
  </a-entity>
  <a-entity position="-15 0 15">
    <a-cylinder radius="0.55" height="8" color="#1a1107" material="roughness:0.7;metalness:0.2" segments-radial="16"></a-cylinder>
    <a-cylinder position="0 4.1 0" radius="0.75" height="0.35" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
  </a-entity>
  <a-entity position=" 15 0 15">
    <a-cylinder radius="0.55" height="8" color="#1a1107" material="roughness:0.7;metalness:0.2" segments-radial="16"></a-cylinder>
    <a-cylinder position="0 4.1 0" radius="0.75" height="0.35" color="#3a2a10" material="roughness:0.5;metalness:0.5"></a-cylinder>
  </a-entity>

  <!-- ══════════════════════
       FUENTE CENTRAL
  ══════════════════════ -->
  <a-entity position="0 0 0" id="fountain">
    <!-- Base mayor de mármol oscuro -->
    <a-cylinder position="0 0.2 0" radius="4.2" height="0.4" color="#2a1e10" material="roughness:0.6;metalness:0.2"></a-cylinder>
    <!-- Borde dorado de la pila -->
    <a-torus position="0 0.45 0" rotation="90 0 0" radius="4.0" radius-tubular="0.07" color="#c8922a" material="roughness:0.3;metalness:0.7"></a-torus>
    <!-- Agua inferior  -->
    <a-cylinder position="0 0.43 0" radius="3.8" height="0.06" color="#0b3d5a" material="opacity:0.7;transparent:true;roughness:0;metalness:0.8"></a-cylinder>
    <!-- Reflejo de agua animado -->
    <a-plane position="0 0.44 0" rotation="-90 0 0" src="#water-tex" width="7.4" height="7.4"
      material="opacity:0.3;transparent:true;roughness:0;color:#0a6080">
      <a-animation attribute="rotation" to="-90 360 0" dur="25000" repeat="indefinite" easing="linear"></a-animation>
    </a-plane>

    <!-- Pilar central estriado (múltiples cilindros apilados) -->
    <a-cylinder position="0 0.8 0"  radius="0.55" height="1.2" color="#c8c0b0" material="roughness:0.4"></a-cylinder>
    <a-cylinder position="0 1.6 0"  radius="0.45" height="0.8" color="#b8b0a0" material="roughness:0.4"></a-cylinder>
    <!-- Platillo intermedio -->
    <a-cylinder position="0 2.1 0"  radius="2.2"  height="0.15" color="#9a9080" material="roughness:0.5"></a-cylinder>
    <a-torus     position="0 2.1 0" rotation="90 0 0" radius="2.15" radius-tubular="0.045" color="#c8922a" material="roughness:0.3;metalness:0.7"></a-torus>
    <!-- Agua platillo -->
    <a-cylinder position="0 2.2 0"  radius="2.0"  height="0.04" color="#0a4a6a" material="opacity:0.65;transparent:true"></a-cylinder>
    <!-- Pilar superior -->
    <a-cylinder position="0 2.5 0"  radius="0.35" height="0.7" color="#b8b0a0" material="roughness:0.4"></a-cylinder>
    <!-- Cúspide esférica -->
    <a-sphere   position="0 3.0 0"  radius="0.5"  color="#e0d8c8" material="roughness:0.3;metalness:0.2"></a-sphere>

    <!-- Focos bajo el agua -->
    <a-light type="spot" color="#1a8fb8" intensity="2.5" position="3 0.5 0"    rotation="70 -90 0" angle="40" penumbra="0.7"></a-light>
    <a-light type="spot" color="#1a8fb8" intensity="2.5" position="-3 0.5 0"   rotation="70 90 0"  angle="40" penumbra="0.7"></a-light>
    <a-light type="spot" color="#1a8fb8" intensity="2.5" position="0 0.5 3"    rotation="70 0 0"   angle="40" penumbra="0.7"></a-light>
    <a-light type="spot" color="#1a8fb8" intensity="2.5" position="0 0.5 -3"   rotation="70 180 0" angle="40" penumbra="0.7"></a-light>

<!-- ══════════════════════════════════
     LÓGICA JS: Carga + Panel de obra
══════════════════════════════════ -->
<script>
  // ── Loading screen ──
  window.addEventListener('load', () => {
    setTimeout(() => {
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('hud').classList.add('visible');
      document.getElementById('compass').classList.add('visible');
    }, 3400);
  });

  // ── Panel de información al hacer click en obra ──
  const panel      = document.getElementById('artwork-panel');
  const panelTitle = document.getElementById('panel-title');
  const panelMeta  = document.getElementById('panel-meta');
  const panelDesc  = document.getElementById('panel-desc');
  let   panelTimer = null;

  function showPanel(el) {
    panelTitle.textContent = el.dataset.title || '';
    panelMeta.textContent  = el.dataset.meta  || '';
    panelDesc.textContent  = el.dataset.desc  || '';
    panel.classList.add('visible');
    if (panelTimer) clearTimeout(panelTimer);
    panelTimer = setTimeout(() => panel.classList.remove('visible'), 7000);
  }

  document.querySelectorAll('.artwork').forEach(el => {
    el.addEventListener('click', () => showPanel(el));
  });

  // ── Brújula (sigue la cámara) ──
  const compass = document.getElementById('compass');
  const dirs = ['N','NE','E','SE','S','SO','O','NO'];
  function updateCompass() {
    const cam = document.querySelector('[camera]');
    if (!cam) return;
    const rot = cam.object3D.rotation.y * (180 / Math.PI);
    const norm = ((rot % 360) + 360) % 360;
    const idx  = Math.round(norm / 45) % 8;
    compass.textContent = dirs[idx];
    requestAnimationFrame(updateCompass);
  }
  document.querySelector('a-scene').addEventListener('loaded', updateCompass);
</script>
