<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Museo VR — Automóviles Antiguos Reales</title>
  <meta name="description" content="Museo virtual 3D inmersivo con automóviles antiguos reales del 1886 al 1940. Maquetas 3D detalladas.">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body{margin:0;padding:0;background:#000;overflow:hidden}
    #loading{position:fixed;inset:0;background:linear-gradient(135deg,#0a0806,#1a1510);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 1.5s}
    #loading h1{color:#c8a44e;font-family:Georgia,serif;font-size:2.6em;letter-spacing:6px}
    #loading p{color:#887755;font-size:1em;letter-spacing:4px;font-family:Georgia,serif}
    .bar{width:180px;height:2px;background:linear-gradient(90deg,transparent,#c8a44e,transparent);margin:18px 0;animation:glow 2s infinite}
    @keyframes glow{0%,100%{opacity:.2}50%{opacity:1}}
    #info-panel{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(15,12,8,.95);border:1px solid #c8a44e;border-radius:10px;padding:22px 32px;color:#f0e8d8;z-index:100;display:none;max-width:520px;backdrop-filter:blur(12px);text-align:center;font-family:Georgia,serif}
    #info-panel h2{color:#c8a44e;margin:0 0 10px;font-size:1.4em;letter-spacing:2px}
    #info-panel .specs{color:#bba880;font-size:.92em;line-height:1.7}
    #info-panel .close{position:absolute;top:6px;right:14px;color:#c8a44e;cursor:pointer;font-size:1.3em;background:none;border:none;font-family:Georgia,serif}
  </style>
</head>
<body>

<div id="loading">
  <h1>Automóviles Antiguos</h1>
  <div class="bar"></div>
  <p>Cargando museo · 1886–1940</p>
</div>

<div id="info-panel">
  <button class="close" onclick="this.parentElement.style.display='none'">&times;</button>
  <h2 id="pName"></h2>
  <div id="pSpecs" class="specs"></div>
</div>

<a-scene renderer="antialias:true;colorManagement:true" fog="type:exponential;color:#0a0806;density:0.01" loading-screen="enabled:false">

<script>
document.querySelector('a-scene').addEventListener('loaded',()=>{
  const l=document.getElementById('loading');
  l.style.opacity='0';setTimeout(()=>l.remove(),1600);
});

// ===== ROTATE =====
AFRAME.registerComponent('spin',{
  schema:{speed:{type:'number',default:0.1}},
  tick(t,dt){this.el.object3D.rotation.y+=this.data.speed*dt*0.001;}
});

// ===== INFO CLICK =====
AFRAME.registerComponent('car-info',{
  schema:{name:{type:'string'},year:{type:'string'},engine:{type:'string'},power:{type:'string'},speed:{type:'string'},prod:{type:'string'},origin:{type:'string'},price:{type:'string'},fact:{type:'string'}},
  init(){
    this.el.addEventListener('click',()=>{
      const d=this.data;
      document.getElementById('pName').textContent=d.name+' ('+d.year+')';
      document.getElementById('pSpecs').innerHTML=
        '🏴 '+d.origin+'<br>🔧 Motor: '+d.engine+'<br>⚡ Potencia: '+d.power+'<br>💨 Vel. máx: '+d.speed+
        '<br>🏭 Producción: '+d.prod+'<br>💰 Valor actual: '+d.price+'<br>📜 '+d.fact;
      document.getElementById('info-panel').style.display='block';
    });
  }
});

// ===== VINTAGE CAR BUILDER =====
AFRAME.registerComponent('vintage-car',{
  schema:{
    bodyColor:{type:'color',default:'#1a1a1a'},
    brassColor:{type:'color',default:'#b8860b'},
    leatherColor:{type:'color',default:'#5c3a1e'},
    bodyL:{type:'number',default:3.8},
    bodyW:{type:'number',default:1.5},
    bodyH:{type:'number',default:0.5},
    hoodL:{type:'number',default:1.4},
    hoodH:{type:'number',default:0.55},
    cabL:{type:'number',default:1.5},
    cabH:{type:'number',default:0.8},
    cabOff:{type:'number',default:-0.2},
    wR:{type:'number',default:0.38},
    hasRunningBoard:{type:'boolean',default:true},
    hasFenders:{type:'boolean',default:true},
    hasSoftTop:{type:'boolean',default:false},
    hasWindshield:{type:'boolean',default:true},
    hasTrunk:{type:'boolean',default:false},
    hasSpare:{type:'boolean',default:false},
    spokeWheels:{type:'boolean',default:true},
    style:{type:'string',default:'touring'},
    headlightSize:{type:'number',default:0.14},
  },
  init(){
    const d=this.data,el=this.el;
    const bL=d.bodyL,bW=d.bodyW,bH=d.bodyH,wR=d.wR;
    const baseY=wR+0.08;
    const brass=d.brassColor;

    // === CHASSIS FRAME ===
    this.box(el,bL*1.05,0.06,0.12,`0 ${baseY-0.06} ${bW*0.35}`,'#1a1008','roughness:0.8');
    this.box(el,bL*1.05,0.06,0.12,`0 ${baseY-0.06} ${-bW*0.35}`,'#1a1008','roughness:0.8');
    // Cross members
    this.box(el,0.1,0.05,bW*0.8,`${bL*0.3} ${baseY-0.06} 0`,'#1a1008','roughness:0.8');
    this.box(el,0.1,0.05,bW*0.8,`${-bL*0.3} ${baseY-0.06} 0`,'#1a1008','roughness:0.8');

    // === MAIN BODY ===
    this.box(el,bL*0.65,bH,bW,`${-bL*0.05} ${baseY+bH/2} 0`,d.bodyColor,'roughness:0.35;metalness:0.4');

    // === HOOD / ENGINE COMPARTMENT ===
    const hL=d.hoodL,hH=d.hoodH;
    this.box(el,hL,hH,bW*0.7,`${bL/2-hL/2+0.05} ${baseY+hH/2} 0`,d.bodyColor,'roughness:0.3;metalness:0.45');
    // Hood side vents
    for(let s of[-1,1]){
      for(let i=0;i<3;i++){
        this.box(el,0.12,0.03,0.02,`${bL/2-hL*0.3-i*0.18} ${baseY+hH*0.7} ${s*bW*0.36}`,brass,'roughness:0.15;metalness:0.85');
      }
    }
    // Hood ornament
    this.box(el,0.02,0.12,0.02,`${bL/2+0.05} ${baseY+hH+0.06} 0`,brass,'roughness:0.1;metalness:0.9');

    // === RADIATOR (front grille) ===
    this.box(el,0.08,hH*1.1,bW*0.55,`${bL/2+0.08} ${baseY+hH*0.5} 0`,brass,'roughness:0.15;metalness:0.85');
    // Grille slats
    for(let i=0;i<5;i++){
      this.box(el,0.03,0.02,bW*0.5,`${bL/2+0.1} ${baseY+hH*0.2+i*hH*0.15} 0`,'#0a0a0a','roughness:0.3');
    }

    // === CABIN ===
    const cL=d.cabL,cH=d.cabH,cOff=d.cabOff;
    const cabY=baseY+bH;
    if(d.hasSoftTop){
      // Soft top frame (canvas roof)
      // Uprights
      for(let s of[-1,1]){
        this.cyl(el,0.03,cH,`${cOff+cL/2} ${cabY+cH/2} ${s*bW*0.42}`,'#2a2015','roughness:0.6');
        this.cyl(el,0.03,cH,`${cOff-cL/2} ${cabY+cH/2} ${s*bW*0.42}`,'#2a2015','roughness:0.6');
      }
      // Canvas top
      this.box(el,cL+0.1,0.04,bW*0.88,`${cOff} ${cabY+cH} 0`,'#2a2a1a','roughness:0.9;metalness:0.05');
      // Side canvas
      this.box(el,cL+0.1,cH*0.3,0.02,`${cOff} ${cabY+cH-cH*0.15} ${bW*0.44}`,'#2a2a1a','roughness:0.9;opacity:0.7;transparent:true');
      this.box(el,cL+0.1,cH*0.3,0.02,`${cOff} ${cabY+cH-cH*0.15} ${-bW*0.44}`,'#2a2a1a','roughness:0.9;opacity:0.7;transparent:true');
    } else {
      // Hard top cabin
      this.box(el,cL,cH,bW*0.85,`${cOff} ${cabY+cH/2} 0`,d.bodyColor,'roughness:0.3;metalness:0.4');
      // Cabin windows
      for(let s of[-1,1]){
        this.box(el,cL*0.85,cH*0.55,0.02,`${cOff} ${cabY+cH*0.55} ${s*bW*0.43}`,'#1a2a3a','opacity:0.4;transparent:true;metalness:0.7');
      }
      // Roof
      this.box(el,cL*0.9,0.05,bW*0.8,`${cOff} ${cabY+cH+0.02} 0`,d.bodyColor,'roughness:0.3;metalness:0.4');
    }

    // === WINDSHIELD ===
    if(d.hasWindshield){
      this.box(el,0.04,cH*0.6,bW*0.7,`${cOff+cL/2+0.1} ${cabY+cH*0.45} 0`,'#c8d8e8','opacity:0.35;transparent:true;metalness:0.8','0 0 12');
      // Brass windshield frame
      this.box(el,0.05,0.03,bW*0.72,`${cOff+cL/2+0.12} ${cabY+cH*0.7} 0`,brass,'roughness:0.15;metalness:0.85','0 0 12');
      this.box(el,0.05,0.03,bW*0.72,`${cOff+cL/2+0.06} ${cabY+cH*0.15} 0`,brass,'roughness:0.15;metalness:0.85','0 0 12');
    }

    // === SEATS (leather) ===
    // Front seat
    this.box(el,0.5,0.25,bW*0.65,`${cOff+cL*0.15} ${cabY+0.12} 0`,d.leatherColor,'roughness:0.7;metalness:0.05');
    // Seat back
    this.box(el,0.08,0.4,bW*0.65,`${cOff-0.05} ${cabY+0.35} 0`,d.leatherColor,'roughness:0.7;metalness:0.05');
    // Rear seat (for touring)
    if(d.style==='touring'||d.style==='limousine'){
      this.box(el,0.5,0.25,bW*0.65,`${cOff-cL*0.3} ${cabY+0.12} 0`,d.leatherColor,'roughness:0.7;metalness:0.05');
      this.box(el,0.08,0.4,bW*0.65,`${cOff-cL*0.55} ${cabY+0.35} 0`,d.leatherColor,'roughness:0.7;metalness:0.05');
    }

    // === STEERING WHEEL (brass column + wheel) ===
    const steerX=cOff+cL*0.3, steerY=cabY+0.55;
    this.cyl(el,0.02,0.45,`${steerX} ${steerY} ${bW*0.18}`,brass,'roughness:0.15;metalness:0.85','20 0 0');
    const stWheel=document.createElement('a-torus');
    stWheel.setAttribute('radius',0.12);stWheel.setAttribute('radius-tubular',0.012);
    stWheel.setAttribute('position',`${steerX+0.08} ${steerY+0.2} ${bW*0.18}`);
    stWheel.setAttribute('rotation','70 0 0');
    stWheel.setAttribute('color','#1a1008');stWheel.setAttribute('material','roughness:0.5;metalness:0.3');
    el.appendChild(stWheel);

    // === HEADLIGHTS (brass oil lamps) ===
    const hlS=d.headlightSize;
    for(let s of[-1,1]){
      // Lamp body
      this.cyl(el,hlS,hlS*1.5,`${bL/2+0.12} ${baseY+hH*0.65} ${s*bW*0.38}`,brass,'roughness:0.15;metalness:0.85','0 0 90');
      // Lamp glass
      const glass=document.createElement('a-sphere');
      glass.setAttribute('radius',hlS*0.7);
      glass.setAttribute('position',`${bL/2+0.2} ${baseY+hH*0.65} ${s*bW*0.38}`);
      glass.setAttribute('color','#ffffdd');glass.setAttribute('material','emissive:#ffffaa;emissiveIntensity:0.5;opacity:0.8;transparent:true');
      el.appendChild(glass);
      // Lamp bracket
      this.box(el,0.18,0.03,0.03,`${bL/2+0.04} ${baseY+hH*0.65} ${s*bW*0.38}`,brass,'roughness:0.15;metalness:0.85');
    }

    // === TAILLIGHTS (small brass) ===
    for(let s of[-1,1]){
      this.cyl(el,0.05,0.06,`${-bL/2-0.03} ${baseY+bH*0.6} ${s*bW*0.38}`,'#cc1111','emissive:#ff0000;emissiveIntensity:0.4','0 0 90');
    }

    // === RUNNING BOARDS ===
    if(d.hasRunningBoard){
      for(let s of[-1,1]){
        this.box(el,bL*0.45,0.04,0.28,`${-bL*0.05} ${baseY+0.02} ${s*(bW/2+0.16)}`,'#1a1008','roughness:0.6;metalness:0.3');
        // Running board supports
        this.box(el,0.04,0.08,0.15,`${bL*0.1} ${baseY-0.02} ${s*(bW/2+0.16)}`,brass,'roughness:0.2;metalness:0.8');
        this.box(el,0.04,0.08,0.15,`${-bL*0.15} ${baseY-0.02} ${s*(bW/2+0.16)}`,brass,'roughness:0.2;metalness:0.8');
      }
    }

    // === FENDERS (mudguards) ===
    if(d.hasFenders){
      const wPos=[{x:bL*0.34,s:1},{x:bL*0.34,s:-1},{x:-bL*0.34,s:1},{x:-bL*0.34,s:-1}];
      wPos.forEach(wp=>{
        // Fender arch
        const fender=document.createElement('a-torus');
        fender.setAttribute('radius',wR+0.06);fender.setAttribute('radius-tubular',0.04);
        fender.setAttribute('theta-length',180);fender.setAttribute('theta-start',0);
        fender.setAttribute('rotation',`0 0 ${wp.s>0?0:0}`);
        fender.setAttribute('position',`${wp.x} ${wR+0.04} ${wp.s*(bW/2+0.06)}`);
        fender.setAttribute('rotation','90 90 0');
        fender.setAttribute('color',d.bodyColor);fender.setAttribute('material','roughness:0.3;metalness:0.4');
        el.appendChild(fender);
      });
    }

    // === SPOKE WHEELS ===
    const wheelX=[bL*0.34,-bL*0.34];
    const wheelZ=[bW/2+0.08,-bW/2-0.08];
    wheelX.forEach(wx=>{
      wheelZ.forEach(wz=>{
        // Tire (rubber)
        this.cyl(el,wR,0.14,`${wx} ${wR} ${wz}`,'#1a1008','roughness:0.95','90 0 0');
        // Tire rim ring
        const rimRing=document.createElement('a-torus');
        rimRing.setAttribute('radius',wR*0.92);rimRing.setAttribute('radius-tubular',0.02);
        rimRing.setAttribute('rotation','90 0 0');
        rimRing.setAttribute('position',`${wx} ${wR} ${wz}`);
        rimRing.setAttribute('color',brass);rimRing.setAttribute('material','roughness:0.15;metalness:0.85');
        el.appendChild(rimRing);
        // Hub center
        this.cyl(el,wR*0.15,0.16,`${wx} ${wR} ${wz}`,brass,'roughness:0.15;metalness:0.85','90 0 0');
        // Spokes
        if(d.spokeWheels){
          for(let a=0;a<8;a++){
            const angle=a*Math.PI/4;
            const sx=Math.cos(angle)*wR*0.45;
            const sy=Math.sin(angle)*wR*0.45;
            const spoke=document.createElement('a-box');
            spoke.setAttribute('width',wR*0.85);spoke.setAttribute('height',0.018);spoke.setAttribute('depth',0.018);
            spoke.setAttribute('position',`${wx} ${wR+sy*0.5} ${wz}`);
            spoke.setAttribute('rotation',`${a*45} 0 0`);
            spoke.setAttribute('color',brass);spoke.setAttribute('material','roughness:0.15;metalness:0.85');
            el.appendChild(spoke);
          }
        }
      });
    });

    // === TRUNK ===
    if(d.hasTrunk){
      this.box(el,0.6,0.4,bW*0.55,`${-bL/2+0.1} ${baseY+bH*0.7} 0`,d.leatherColor,'roughness:0.65;metalness:0.1');
      // Trunk straps
      this.box(el,0.62,0.03,0.06,`${-bL/2+0.1} ${baseY+bH*0.95} ${bW*0.15}`,brass,'roughness:0.2;metalness:0.8');
      this.box(el,0.62,0.03,0.06,`${-bL/2+0.1} ${baseY+bH*0.95} ${-bW*0.15}`,brass,'roughness:0.2;metalness:0.8');
    }

    // === SPARE WHEEL ===
    if(d.hasSpare){
      this.cyl(el,wR*0.8,0.1,`${-bL/2-0.08} ${baseY+bH*0.5} 0`,'#1a1008','roughness:0.9','0 90 0');
      this.cyl(el,wR*0.12,0.12,`${-bL/2-0.08} ${baseY+bH*0.5} 0`,brass,'roughness:0.15;metalness:0.85','0 90 0');
    }

    // === EXHAUST PIPES ===
    this.cyl(el,0.03,0.5,`${-bL/2} ${baseY-0.02} ${bW*0.25}`,brass,'roughness:0.2;metalness:0.8','0 0 90');

    // === DOOR HANDLES ===
    for(let s of[-1,1]){
      this.box(el,0.1,0.025,0.025,`${cOff+cL*0.2} ${cabY+bH*0.4} ${s*(bW/2+0.01)}`,brass,'roughness:0.15;metalness:0.85');
    }
  },
  box(p,w,h,dp,pos,col,mat,rot){
    const b=document.createElement('a-box');
    b.setAttribute('width',w);b.setAttribute('height',h);b.setAttribute('depth',dp);
    b.setAttribute('position',pos);b.setAttribute('color',col);b.setAttribute('material',mat);
    if(rot)b.setAttribute('rotation',rot);p.appendChild(b);
  },
  cyl(p,r,h,pos,col,mat,rot){
    const c=document.createElement('a-cylinder');
    c.setAttribute('radius',r);c.setAttribute('height',h);
    c.setAttribute('position',pos);c.setAttribute('color',col);c.setAttribute('material',mat);
    if(rot)c.setAttribute('rotation',rot);p.appendChild(c);
  }
});

// ===== BUILD SCENE =====
document.addEventListener('DOMContentLoaded',()=>{
  const scene=document.querySelector('a-scene');
  const cols=4,spX=11,spZ=11;
  const stX=-(cols-1)*spX/2, stZ=-12;

  CARS.forEach((c,i)=>{
    const row=Math.floor(i/cols),col=i%cols;
    const px=stX+col*spX, pz=stZ+row*spZ;

    const g=document.createElement('a-entity');
    g.setAttribute('position',`${px} 0 ${pz}`);

    // Cobblestone pedestal
    const base=document.createElement('a-cylinder');
    base.setAttribute('radius',3.2);base.setAttribute('height',0.25);
    base.setAttribute('position','0 0.12 0');base.setAttribute('segments-radial',24);
    base.setAttribute('color','#1a1812');base.setAttribute('material','roughness:0.2;metalness:0.6');
    g.appendChild(base);

    // Brass ring
    const ring=document.createElement('a-torus');
    ring.setAttribute('radius',3.2);ring.setAttribute('radius-tubular',0.035);
    ring.setAttribute('rotation','90 0 0');ring.setAttribute('position','0 0.26 0');
    ring.setAttribute('color','#c8a44e');ring.setAttribute('material','roughness:0.15;metalness:0.9');
    g.appendChild(ring);

    // Rotating car
    const rot=document.createElement('a-entity');
    rot.setAttribute('position','0 0.26 0');rot.setAttribute('spin','speed:0.08');

    const car=document.createElement('a-entity');
    car.setAttribute('rotation','0 90 0');car.setAttribute('class','clickable');
    car.setAttribute('car-info',{name:c.name,year:c.year,engine:c.engine,power:c.power,speed:c.speed,prod:c.prod,origin:c.origin,price:c.price,fact:c.fact});
    car.setAttribute('vintage-car',{
      bodyColor:c.color,brassColor:c.brass,leatherColor:c.leather,
      bodyL:c.bL,bodyW:c.bW,bodyH:c.bH,hoodL:c.hL,hoodH:c.hH,
      cabL:c.cL,cabH:c.cH,cabOff:c.cO,wR:c.wR,
      hasRunningBoard:c.board,hasFenders:c.fenders,hasSoftTop:c.softTop,
      hasWindshield:c.ws,hasTrunk:c.trunk,hasSpare:c.spare,
      spokeWheels:c.spoke,style:c.style,headlightSize:c.hlS
    });
    rot.appendChild(car);
    g.appendChild(rot);

    // Spotlight
    const spot=document.createElement('a-light');
    spot.setAttribute('type','spot');spot.setAttribute('color','#fff5e0');
    spot.setAttribute('intensity','2.2');spot.setAttribute('position','0 8 0');
    spot.setAttribute('rotation','-90 0 0');spot.setAttribute('angle','28');
    spot.setAttribute('penumbra','0.5');
    g.appendChild(spot);

    // Warm glow
    const gl=document.createElement('a-light');
    gl.setAttribute('type','point');gl.setAttribute('color','#c8a44e');
    gl.setAttribute('intensity','0.08');gl.setAttribute('distance','4');
    gl.setAttribute('position','0 0.4 0');
    g.appendChild(gl);

    // PLAQUE
    const plq=document.createElement('a-entity');
    plq.setAttribute('position','0 0.9 -3.8');

    const pb=document.createElement('a-plane');
    pb.setAttribute('width',3.8);pb.setAttribute('height',1.4);
    pb.setAttribute('color','#0e0c08');pb.setAttribute('material','roughness:0.4');
    plq.appendChild(pb);

    const pbr=document.createElement('a-plane');
    pbr.setAttribute('width',3.9);pbr.setAttribute('height',1.5);
    pbr.setAttribute('color','#c8a44e');pbr.setAttribute('position','0 0 -0.005');
    plq.appendChild(pbr);

    const nt=document.createElement('a-text');
    nt.setAttribute('value',c.name);nt.setAttribute('align','center');
    nt.setAttribute('position','0 0.35 0.02');nt.setAttribute('width',3.5);
    nt.setAttribute('color','#c8a44e');nt.setAttribute('font','mozillavr');
    plq.appendChild(nt);

    const yt=document.createElement('a-text');
    yt.setAttribute('value',c.year+' · '+c.origin);yt.setAttribute('align','center');
    yt.setAttribute('position','0 0.08 0.02');yt.setAttribute('width',2.6);yt.setAttribute('color','#e0d8c8');
    plq.appendChild(yt);

    const et=document.createElement('a-text');
    et.setAttribute('value',c.engine+' — '+c.power);et.setAttribute('align','center');
    et.setAttribute('position','0 -0.15 0.02');et.setAttribute('width',2.3);et.setAttribute('color','#998866');
    plq.appendChild(et);

    const ft=document.createElement('a-text');
    ft.setAttribute('value','▸ Click para más info ◂');et.setAttribute('align','center');
    ft.setAttribute('position','0 -0.42 0.02');ft.setAttribute('width',1.8);ft.setAttribute('color','#c8a44e');
    ft.setAttribute('align','center');
    plq.appendChild(ft);

    g.appendChild(plq);
    scene.appendChild(g);
  });
});
